name: Build Images
on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/images.yaml"
      - "images/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: walnuts1018/infra
  IMAGE_TAG: v1.0.${{ github.run_number }}

jobs:
  discover:
    name: Discover images
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      images: ${{ steps.discover.outputs.images }}
    steps:
      - name: Check out
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Discover image metadata
        id: discover
        run: |
          set -euo pipefail

          images="$(
            find images -mindepth 2 -maxdepth 2 -name Dockerfile -print | sort | while read -r dockerfile; do
              app_dir="$(dirname "$dockerfile")"
              app="$(basename "$app_dir")"
              meta="${app_dir}/meta.json"

              if [ ! -f "$meta" ]; then
                echo "::error file=${meta}::images/${app}/meta.json is required"
                exit 1
              fi

              name="$(jq -r '.name // empty' "$meta")"
              if [ -z "$name" ]; then
                echo "::error file=${meta}::meta.json must define a non-empty .name"
                exit 1
              fi

              if ! printf '%s' "$name" | grep -Eq '^[a-z0-9]+([._-][a-z0-9]+)*$'; then
                echo "::error file=${meta}::.name must be a valid lowercase container image name component"
                exit 1
              fi

              jq -cn \
                --arg app "$app" \
                --arg name "$name" \
                --arg context "$app_dir" \
                '{app: $app, name: $name, context: $context}'
            done | jq -cs .
          )"

          if [ "$images" = "[]" ]; then
            echo "::error::No images/*/Dockerfile entries found"
            exit 1
          fi

          echo "images=${images}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.image.app }} ${{ matrix.platform.key }}
    runs-on: ${{ matrix.platform.os }}
    needs: discover
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJSON(needs.discover.outputs.images) }}
        platform:
          - key: linux-amd64
            os: ubuntu-latest
            platform: linux/amd64
          - key: linux-arm64
            os: ubuntu-24.04-arm
            platform: linux/arm64
    steps:
      - name: Check out
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          version: latest

      - name: Build and push image by digest
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ${{ matrix.image.context }}
          platforms: ${{ matrix.platform.platform }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image.name }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image.name }}-cache:${{ matrix.platform.key }}
          cache-to: type=registry,mode=max,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image.name }}-cache:${{ matrix.platform.key }}

      - name: Export digest
        run: |
          set -euo pipefail

          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ matrix.image.name }}-${{ matrix.platform.key }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge ${{ matrix.image.app }}
    runs-on: ubuntu-latest
    needs:
      - discover
      - build
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJSON(needs.discover.outputs.images) }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.image.name }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          version: latest

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          set -euo pipefail

          # shellcheck disable=SC2046
          docker buildx imagetools create \
            -t "${REGISTRY}/${IMAGE_NAMESPACE}/${{ matrix.image.name }}:latest" \
            -t "${REGISTRY}/${IMAGE_NAMESPACE}/${{ matrix.image.name }}:${IMAGE_TAG}" \
            $(printf "${REGISTRY}/${IMAGE_NAMESPACE}/${{ matrix.image.name }}@sha256:%s " *)
