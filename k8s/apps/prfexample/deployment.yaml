apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: prfexample
    app.kubernetes.io/name: prfexample
  name: prfexample
  namespace: prfexample
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prfexample
      app.kubernetes.io/name: prfexample
  template:
    metadata:
      labels:
        app: prfexample
        app.kubernetes.io/name: prfexample
    spec:
      containers:
        - env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://default-collector.opentelemetry-collector.svc.cluster.local:4317
            - name: SCYLLA_CA_CERT_PATH
              value: /etc/certs/scylla-db/ca.crt
            - name: SCYLLA_CLIENT_CERT_PATH
              value: /etc/certs/scylla-db-client/tls.crt
            - name: SCYLLA_CLIENT_KEY_PATH
              value: /etc/certs/scylla-db-client/tls.key
            - name: SCYLLA_HOST
              value: scylla-cluster-client.databases.svc.cluster.local
            - name: SCYLLA_PORT
              value: "9142"
            - name: SCYLLA_USER
              valueFrom:
                secretKeyRef:
                  key: scylladb_username
                  name: prfexample-803a13
            - name: SCYLLA_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: scylladb_password
                  name: prfexample-803a13
            - name: SERVER_ADDITIONAL_ORIGINS
              value: android:apk-key-hash:lQHKOP1Xm9fdIS_R8RbgdktIxTaucWdqLFaSe7QJTWM
          image: ghcr.io/walnuts1018/prfexample/server:0.0.39
          imagePullPolicy: IfNotPresent
          livenessProbe:
            httpGet:
              path: /livez
              port: 8080
          name: apiserver
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 2m
              memory: 16Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              add:
                - NET_BIND_SERVICE
              drop:
                - all
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - mountPath: /tmp
              name: tmp
            - mountPath: /etc/certs/scylla-db
              name: scylla-db-ca-cert
              readOnly: true
            - mountPath: /etc/certs/scylla-db-client
              name: scylla-db-client-cert
              readOnly: true
      imagePullSecrets:
        - name: ghcr-login-secret
      volumes:
        - emptyDir: {}
          name: tmp
        - configMap:
            items:
              - key: ca.crt
                path: ca.crt
            name: prfexample-scylladb-ca-cert-c0f830
          name: scylla-db-ca-cert
        - name: scylla-db-client-cert
          secret:
            items:
              - key: tls.crt
                path: tls.crt
              - key: tls.key
                path: tls.key
            secretName: scylla-cluster-local-client-ca
