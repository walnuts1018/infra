apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: prfexample
  namespace: prfexample
spec:
  hostnames:
    - prfexample.walnuts.dev
  parentRefs:
    - name: envoy-gateway
      namespace: envoy-gateway-system
  rules:
    - backendRefs:
        - kind: Service
          name: prfexample
          port: 8080
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
