apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  labels:
    app: diode
    app.kubernetes.io/name: diode
  name: diode
  namespace: netbox
spec:
  hostnames:
    - diode-gateway.netbox.svc.cluster.local
  parentRefs:
    - name: envoy-gateway
      namespace: envoy-gateway-system
  rules:
    - backendRefs:
        - kind: Service
          name: diode-auth
          port: 8080
          weight: 1
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              replacePrefixMatch: /
              type: ReplacePrefixMatch
      matches:
        - path:
            type: PathPrefix
            value: /diode/auth
    - backendRefs:
        - kind: Service
          name: diode-ingester-h2c
          port: 8081
          weight: 1
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              replacePrefixMatch: /diode.v1.IngesterService
              type: ReplacePrefixMatch
      matches:
        - path:
            type: PathPrefix
            value: /diode/diode.v1.IngesterService
    - backendRefs:
        - kind: Service
          name: diode-reconciler-h2c
          port: 8081
          weight: 1
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              replacePrefixMatch: /diode.v1.ReconcilerService
              type: ReplacePrefixMatch
      matches:
        - path:
            type: PathPrefix
            value: /diode/diode.v1.ReconcilerService
