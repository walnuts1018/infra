apiVersion: batch/v1
kind: CronJob
metadata:
  labels:
    app: netbox-discovery
    app.kubernetes.io/name: netbox-discovery
  name: netbox-discovery-snmp
  namespace: netbox
spec:
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 900
      backoffLimit: 0
      template:
        metadata:
          labels:
            app: netbox-discovery
            app.kubernetes.io/name: netbox-discovery
        spec:
          containers:
            - command:
                - /bin/sh
                - /scripts/snmp-discovery.sh
              envFrom:
                - secretRef:
                    name: netbox-discovery
              image: docker.io/netboxlabs/snmp-discovery:1.32.0
              imagePullPolicy: IfNotPresent
              name: snmp-discovery
              resources:
                limits:
                  cpu: 500m
                  memory: 512Mi
                requests:
                  cpu: 20m
                  memory: 64Mi
              securityContext:
                capabilities:
                  add:
                    - NET_BIND_SERVICE
                  drop:
                    - all
                readOnlyRootFilesystem: false
                seccompProfile:
                  type: RuntimeDefault
              volumeMounts:
                - mountPath: /policies
                  name: policies
                  readOnly: true
                - mountPath: /scripts
                  name: scripts
                  readOnly: true
                - mountPath: /tmp
                  name: tmp
          restartPolicy: Never
          volumes:
            - configMap:
                name: netbox-discovery-policy
              name: policies
            - configMap:
                name: netbox-discovery-script-5783a4
              name: scripts
            - emptyDir: {}
              name: tmp
  schedule: 17 */6 * * *
  successfulJobsHistoryLimit: 1
  timeZone: Asia/Tokyo
