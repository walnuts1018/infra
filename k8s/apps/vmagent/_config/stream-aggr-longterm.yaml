- name: transparent-gauges
  match: '{__name__!~".*(_total|_sum|_count|_bucket)$"}'
  interval: 10m
  outputs: [avg]
  keep_metric_names: true
  without: [uid, container_id, pod_template_hash, endpoint]

- name: transparent-counters
  match: '{__name__=~".*(_total|_sum|_count|_bucket)$"}'
  interval: 10m
  outputs: [last]
  keep_metric_names: true
  without: [uid, container_id, pod_template_hash, endpoint]

- name: service-gauge-rollups
  match: '{namespace!="", service!=""}'
  interval: 10m
  outputs: [avg, max]
  by: [k8s_cluster_name, namespace, service, job]
