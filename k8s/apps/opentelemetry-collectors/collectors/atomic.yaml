apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: atomic
spec:
  config:
    exporters:
      debug:
        verbosity: detailed
      file:
        format: json
        path: /tmp/debug.json
      otlp_grpc/mackerel:
        compression: gzip
        endpoint: otlp.mackerelio.com:4317
        headers:
          Mackerel-Api-Key: ${env:MACKEREL_APIKEY}
        sending_queue:
          batch:
            flush_timeout: 10s
            max_size: 5000
            min_size: 5000
      otlp_grpc/pyroscope:
        endpoint: http://pyroscope.pyroscope.svc.cluster.local:4317
        sending_queue:
          batch:
            flush_timeout: 10s
            max_size: 5000
            min_size: 5000
        tls:
          insecure: true
      otlp_grpc/tempo:
        endpoint: tempo-gateway.tempo.svc.cluster.local:4317
        sending_queue:
          batch:
            flush_timeout: 10s
            max_size: 5000
            min_size: 5000
        tls:
          insecure: true
      otlp_http/loki:
        endpoint: http://loki-gateway.loki.svc.cluster.local/otlp
        sending_queue:
          batch:
            flush_timeout: 10s
            max_size: 5000
            min_size: 5000
        tls:
          insecure: true
      otlp_http/mackerel:
        endpoint: https://otlp-vaxila.mackerelio.com
        headers:
          Accept: '*/*'
          Mackerel-Api-Key: ${env:MACKEREL_APIKEY}
        sending_queue:
          batch:
            flush_timeout: 10s
            max_size: 5000
            min_size: 5000
      prometheus_remote_write/victoriametrics:
        endpoint: http://victoria-metrics-victoria-metrics-cluster-vminsert.victoria-metrics.svc.cluster.local:8480/insert/0/prometheus/api/v1/write
        resource_to_telemetry_conversion:
          enabled: true
        timeout: 30s
    processors:
      k8s_attributes:
        auth_type: serviceAccount
        extract:
          metadata:
            - k8s.cluster.uid
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              - from: connection
      memory_limiter:
        check_interval: 1s
        limit_mib: 900
        spike_limit_percentage: 15
      probabilistic_sampler/mackerel:
        sampling_percentage: 5
      resource/cluster_name:
        attributes:
          - action: upsert
            key: k8s.cluster.name
            value: kurumi
      resource/k8s-events-receiver:
        attributes:
          - action: upsert
            key: service.name
            value: k8s-events-receiver
          - action: upsert
            key: service.namespace
            value: k8s-events-receiver
    receivers:
      k8s_cluster:
        allocatable_types_to_report:
          - cpu
          - memory
        auth_type: serviceAccount
        metrics:
          k8s.container.status.reason:
            enabled: true
          k8s.container.status.state:
            enabled: true
          k8s.node.condition:
            enabled: true
          k8s.pod.status_reason:
            enabled: true
        node_conditions_to_report:
          - Ready
          - MemoryPressure
        resource_attributes:
          k8s.container.status.last_terminated_reason:
            enabled: true
          k8s.deployment.name:
            enabled: true
      k8s_events:
        auth_type: serviceAccount
        namespaces: []
      prometheus:
        config:
          scrape_configs:
            - job_name: otel-collector
              scrape_interval: 30s
              static_configs:
                - targets:
                    - 0.0.0.0:8888
    service:
      pipelines:
        logs:
          exporters:
            - otlp_http/loki
          processors:
            - memory_limiter
            - k8s_attributes
            - resource/k8s-events-receiver
            - resource/cluster_name
          receivers:
            - k8s_events
        metrics:
          exporters:
            - prometheus_remote_write/victoriametrics
          processors:
            - memory_limiter
            - k8s_attributes
            - resource/cluster_name
          receivers:
            - k8s_cluster
            - prometheus
  env:
    - name: K8S_NODE_IP
      valueFrom:
        fieldRef:
          fieldPath: status.hostIP
    - name: MACKEREL_APIKEY
      valueFrom:
        secretKeyRef:
          key: mackerel-api-key
          name: opentelemetry-collectors-acaba9
  image: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib:0.156.0
  managementState: managed
  mode: statefulset
  replicas: 1
  resources:
    limits:
      cpu: 500m
      memory: 2Gi
    requests:
      cpu: 30m
      memory: 128Mi
  serviceAccount: opentelemetry-collectors
  tolerations:
    - key: node.walnuts.dev/untrusted
      operator: Exists
  volumeMounts:
    - mountPath: /tmp
      name: tmp
  volumes:
    - emptyDir: {}
      name: tmp
