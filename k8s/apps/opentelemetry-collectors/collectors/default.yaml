apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: default
spec:
  autoscaler:
    maxReplicas: 10
    minReplicas: 1
    targetMemoryUtilization: 100
  config:
    connectors:
      span_metrics:
        dimensions:
          - default: GET
            name: http.method
          - name: http.host
          - name: http.path
          - name: http.target
          - name: http.status_code
        histogram:
          explicit:
            buckets:
              - 1ms
              - 10ms
              - 100ms
              - 200ms
              - 400ms
              - 800ms
              - 1s
        metrics_flush_interval: 15s
    exporters:
      debug:
        verbosity: detailed
      file:
        format: json
        path: /tmp/debug.json
      otlp_grpc/mackerel:
        compression: gzip
        endpoint: otlp.mackerelio.com:4317
        headers:
          Mackerel-Api-Key: ${env:MACKEREL_APIKEY}
        sending_queue:
          batch:
            flush_timeout: 10s
            max_size: 5000
            min_size: 5000
      otlp_grpc/pyroscope:
        endpoint: http://pyroscope.pyroscope.svc.cluster.local:4317
        sending_queue:
          batch:
            flush_timeout: 10s
            max_size: 5000
            min_size: 5000
        tls:
          insecure: true
      otlp_grpc/tempo:
        endpoint: tempo-gateway.tempo.svc.cluster.local:4317
        sending_queue:
          batch:
            flush_timeout: 10s
            max_size: 5000
            min_size: 5000
        tls:
          insecure: true
      otlp_http/loki:
        endpoint: http://loki-gateway.loki.svc.cluster.local/otlp
        sending_queue:
          batch:
            flush_timeout: 10s
            max_size: 5000
            min_size: 5000
        tls:
          insecure: true
      otlp_http/vaxila:
        endpoint: https://otlp-vaxila.mackerelio.com
        headers:
          Accept: '*/*'
          Mackerel-Api-Key: ${env:MACKEREL_APIKEY}
        sending_queue:
          batch:
            flush_timeout: 10s
            max_size: 5000
            min_size: 5000
      prometheusremotewrite/victoriametrics:
        endpoint: http://victoria-metrics-victoria-metrics-cluster-vminsert.victoria-metrics.svc.cluster.local:8480/insert/0/prometheus/api/v1/write
        resource_to_telemetry_conversion:
          enabled: true
        timeout: 30s
    processors:
      k8s_attributes:
        auth_type: serviceAccount
        extract:
          metadata:
            - k8s.cluster.uid
      memory_limiter:
        check_interval: 5s
        limit_mib: 2000
        spike_limit_percentage: 15
      resource/cluster_name:
        attributes:
          - action: upsert
            key: k8s.cluster.name
            value: kurumi
    receivers:
      otlp:
        protocols:
          grpc:
            max_recv_msg_size_mib: 100
          http: {}
    service:
      pipelines:
        logs:
          exporters:
            - otlp_http/loki
          processors:
            - memory_limiter
            - k8s_attributes
            - resource/cluster_name
          receivers:
            - otlp
        metrics:
          exporters:
            - prometheusremotewrite/victoriametrics
          processors:
            - memory_limiter
            - k8s_attributes
            - resource/cluster_name
          receivers:
            - otlp
            - span_metrics
        traces:
          exporters:
            - otlp_grpc/tempo
            - span_metrics
          processors:
            - memory_limiter
            - k8s_attributes
            - resource/cluster_name
          receivers:
            - otlp
  env:
    - name: K8S_NODE_IP
      valueFrom:
        fieldRef:
          fieldPath: status.hostIP
    - name: K8S_NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
    - name: MACKEREL_APIKEY
      valueFrom:
        secretKeyRef:
          key: mackerel-api-key
          name: opentelemetry-collectors-acaba9
  image: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib:0.154.0
  managementState: managed
  mode: deployment
  resources:
    limits:
      cpu: "1"
      memory: 2Gi
    requests:
      cpu: 4m
      memory: 156Mi
  serviceAccount: opentelemetry-collectors
  volumeMounts:
    - mountPath: /tmp
      name: tmp
  volumes:
    - emptyDir: {}
      name: tmp
