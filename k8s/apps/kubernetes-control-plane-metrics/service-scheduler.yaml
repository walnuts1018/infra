apiVersion: v1
kind: Service
metadata:
  labels:
    app: kube-scheduler-metrics-proxy
    app.kubernetes.io/name: kubernetes-control-plane-metrics
    jobLabel: kube-scheduler
  name: kube-scheduler-metrics-proxy
  namespace: kube-system
spec:
  clusterIP: None
  ports:
    - name: http-metrics
      port: 11059
      targetPort: 11059
  selector:
    app: kubernetes-control-plane-metrics-proxy
