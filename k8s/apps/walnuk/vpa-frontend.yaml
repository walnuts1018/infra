apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  labels:
    app: walnuk-frontend
    app.kubernetes.io/name: walnuk-frontend
  name: walnuk-frontend
  namespace: walnuk
spec:
  resourcePolicy:
    containerPolicies:
      - containerName: next
        controlledResources:
          - memory
        maxAllowed:
          cpu: 500m
          memory: 512Mi
        minAllowed:
          cpu: 10m
          memory: 64Mi
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: walnuk-frontend
  updatePolicy:
    updateMode: Auto
