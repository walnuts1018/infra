apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  labels:
    app: walnuk-backend
    app.kubernetes.io/name: walnuk-backend
  name: walnuk-backend
  namespace: walnuk
spec:
  maxReplicaCount: 5
  minReplicaCount: 2
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: walnuk-backend
  triggers:
    - metadata:
        value: "95"
      metricType: Utilization
      type: cpu
