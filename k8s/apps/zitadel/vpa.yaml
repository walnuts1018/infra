apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  labels:
    app: zitadel
    app.kubernetes.io/name: zitadel
  name: zitadel
  namespace: zitadel
spec:
  resourcePolicy:
    containerPolicies:
      - containerName: zitadel
        controlledResources:
          - memory
        maxAllowed:
          cpu: 500m
          memory: 1Gi
        minAllowed:
          cpu: 100m
          memory: 128Mi
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: zitadel
  updatePolicy:
    updateMode: Auto
