image:
  registry: ghcr.io
  repository: walnuts1018/infra/netbox
  tag: v4.6.5
  digest: sha256:c3434c6049d08a97b9920f45a37c307c8786a9759a02a5d1cf3f724fb5076515

superuser:
  existingSecret: "netbox"

allowedHosts:
- "netbox.walnuts.dev"

csrf:
  trustedOrigins:
  - "https://netbox.walnuts.dev"

## Login required for all users
loginRequired: true
loginPersistence: true

timeZone: Asia/Tokyo

email:
  server: smtp.resend.com
  port: 587
  username: "resend"
  useTLS: true
  from: "netbox@resend.walnuts.dev"
  existingSecretName: "netbox"
  existingSecretKey: smtp-password

existingSecret: "netbox"

postgresql:
  enabled: false

externalDatabase:
  host: postgresql-default-rw.databases.svc.cluster.local
  port: 5432
  database: netbox
  username: netbox
  existingSecretName: "netbox"
  existingSecretKey: db-password

valkey:
  enabled: true
  auth:
    existingSecret: "netbox"
    existingSecretPasswordKey: valkey_password
  primary:
    persistence:
      storageClass: "longhorn-local"
      size: 2Gi
  replica:
    persistence:
      storageClass: "longhorn-local"
      size: 2Gi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 95

housekeeping:
  enabled: true
  schedule: "0 0 * * *"
  timezone: "Asia/Tokyo"

persistence:
  enabled: false

storages:
  default:
    BACKEND: storages.backends.s3boto3.S3Boto3Storage
    OPTIONS:
      bucket_name: netbox-media
      endpoint_url: https://seaweedfs.local.walnuts.dev
      default_acl: private
      addressing_style: path
  scripts:
    BACKEND: storages.backends.s3boto3.S3Boto3Storage
    OPTIONS:
      bucket_name: netbox-scripts
      endpoint_url: https://seaweedfs.local.walnuts.dev
      default_acl: private
      addressing_style: path

extraEnvVars:
- name: AWS_WEB_IDENTITY_TOKEN_FILE
  value: /var/run/secrets/sts.seaweedfs.com/serviceaccount/token
- name: AWS_ENDPOINT_URL_STS
  value: https://seaweedfs.local.walnuts.dev
- name: AWS_REGION
  value: us-east-1
- name: AWS_ROLE_ARN
  value: arn:aws:iam::role/netbox

extraVolumes:
- name: seaweedfs-sa-token
  projected:
    sources:
    - serviceAccountToken:
        audience: sts.seaweedfs.com
        expirationSeconds: 86400
        path: token

extraVolumeMounts:
- name: seaweedfs-sa-token
  mountPath: /var/run/secrets/sts.seaweedfs.com/serviceaccount
  readOnly: true

serviceAccount:
  create: false
  name: netbox

resources:
  requests:
    cpu: 95m
    memory: 1300Mi
  limits:
    cpu: "2"
    memory: 3Gi

worker:
  resources:
    requests:
      cpu: 5m
      memory: 233Mi
    limits:
      cpu: "1"
      memory: 1Gi

replicaCount: 1

ingress:
  enabled: false

httpRoute:
  enabled: true
  annotations:
    external-dns-cloudflare.alpha.kubernetes.io/cloudflare-proxied: "true"
  parentRefs:
  - name: envoy-gateway
    namespace: envoy-gateway-system
  hostnames:
  - netbox.walnuts.dev

remoteAuth:
  enabled: true
  backends:
  - social_core.backends.open_id_connect.OpenIdConnectAuth
  autoCreateUser: true
  extraConfig:
  - secret:
      secretName: "netbox-oidc-config"

topologySpreadConstraints:
- maxSkew: 1
  topologyKey: 'kubernetes.io/hostname'
  whenUnsatisfiable: 'ScheduleAnyway'
  labelSelector:
    matchLabels:
      app.kubernetes.io/name: netbox

plugins:
- netbox_diode_plugin
pluginsConfig:
  netbox_diode_plugin:
    diode_target_override: "grpc://diode-gateway.netbox.svc.cluster.local/diode"
    diode_username: "diode"

extraConfig:
- secret:
    secretName: "netbox-diode-config"
