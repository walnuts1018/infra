apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  labels:
    app: stalwart
    app.kubernetes.io/name: stalwart
  name: stalwart
  namespace: stalwart
spec:
  resourcePolicy:
    containerPolicies:
      - containerName: stalwart
        controlledResources:
          - memory
        maxAllowed:
          cpu: 500m
          memory: 256Mi
        minAllowed:
          cpu: 10m
          memory: 10Mi
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: stalwart
  updatePolicy:
    updateMode: Auto
