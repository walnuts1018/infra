apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  labels:
    app: stalwart
    app.kubernetes.io/name: stalwart
  name: stalwart
  namespace: stalwart
spec:
  maxReplicaCount: 2
  minReplicaCount: 1
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: stalwart
  triggers:
    - metadata:
        value: "95"
      metricType: Utilization
      type: cpu
