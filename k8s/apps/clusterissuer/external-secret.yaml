apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-api-token-fb60a7
spec:
  data:
    - remoteRef:
        key: cert-manager
        property: cloudflare_api_token
      secretKey: api-token
  refreshInterval: 1m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: cloudflare-api-token-fb60a7
    template:
      engineVersion: v2
      type: Opaque
