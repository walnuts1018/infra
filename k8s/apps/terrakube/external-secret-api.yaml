apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: terrakube-api-secrets-overlay-2d6ea7
  namespace: terrakube
spec:
  data:
    - remoteRef:
        key: terrakube
        property: pat_secret
      secretKey: patSecret
    - remoteRef:
        key: terrakube
        property: internal_secret
      secretKey: internalSecret
    - remoteRef:
        key: terrakube
        property: redis_password
      secretKey: redisPassword
    - remoteRef:
        key: postgres_passwords
        property: terrakube
      secretKey: postgresPassword
  refreshInterval: 1m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: terrakube-api-secrets-overlay-2d6ea7
    template:
      data:
        DatasourcePassword: '{{ .postgresPassword }}'
        InternalSecret: '{{ .internalSecret }}'
        PatSecret: '{{ .patSecret }}'
        TerrakubeRedisPassword: '{{ .redisPassword }}'
      engineVersion: v2
      type: Opaque
