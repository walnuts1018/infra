apiVersion: redis.redis.opstreelabs.in/v1beta2
kind: Redis
metadata:
  labels:
    app: terrakube-redis
    app.kubernetes.io/name: terrakube-redis
  name: terrakube-redis
  namespace: terrakube
spec:
  kubernetesConfig:
    image: quay.io/opstree/redis:v7.2.7
    imagePullPolicy: IfNotPresent
    redisSecret:
      key: redispassword
      name: terrakube-redis-1dc0ec
  podSecurityContext:
    fsGroup: 1000
    runAsUser: 1000
  storage:
    volumeClaimTemplate:
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
