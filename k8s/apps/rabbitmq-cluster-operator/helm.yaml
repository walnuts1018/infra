apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rabbitmq-cluster-operator-helm
  namespace: argocd
spec:
  destination:
    namespace: rabbitmq-operator
    server: https://kubernetes.default.svc
  project: default
  source:
    chart: rabbitmq-cluster-operator
    helm:
      releaseName: rabbitmq-cluster-operator
      values: |
        msgTopologyOperator:
          enabled: false

        clusterOperator:
          watchAllNamespaces: true
          resources:
            requests:
              cpu: 25m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          tolerations:
          - key: "node.walnuts.dev/low-performance"
            operator: "Exists"
    repoURL: https://klicktipp.github.io/helm-charts/
    targetRevision: 0.4.0
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - FailOnSharedResource=true
