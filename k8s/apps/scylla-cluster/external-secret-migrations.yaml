apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: scylla-cluster-migrations-e340c7
  namespace: databases
spec:
  data:
    - remoteRef:
        key: scylladb
        property: admin
      secretKey: admin_password
    - remoteRef:
        key: scylladb
        property: walnuk
      secretKey: walnuk_password
    - remoteRef:
        key: scylladb
        property: seaweedfs
      secretKey: seaweedfs_password
    - remoteRef:
        key: scylladb
        property: prfexample
      secretKey: prfexample_password
  refreshInterval: 1m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: scylla-cluster-migrations-e340c7
    template:
      data:
        admin_password: '{{ .admin_password }}'
        admin_username: cassandra
        migrations.cql: |
          CREATE KEYSPACE IF NOT EXISTS walnuk
              WITH replication = {'class': 'NetworkTopologyStrategy', 'iwakura': '3'}
              AND tablets = {'enabled': false};
          CREATE ROLE IF NOT EXISTS 'walnuk'
              WITH PASSWORD = '{{ .walnuk_password }}'
              AND SUPERUSER = false
              AND LOGIN = true;
          GRANT ALL PERMISSIONS ON KEYSPACE walnuk TO 'walnuk';


          CREATE KEYSPACE IF NOT EXISTS seaweedfs
              WITH replication = {'class': 'NetworkTopologyStrategy', 'iwakura': '3'}
              AND tablets = {'enabled': false};
          CREATE ROLE IF NOT EXISTS 'seaweedfs'
              WITH PASSWORD = '{{ .seaweedfs_password }}'
              AND SUPERUSER = false
              AND LOGIN = true;
          GRANT ALL PERMISSIONS ON KEYSPACE seaweedfs TO 'seaweedfs';
          CREATE TABLE seaweedfs.filemeta (
              dirhash bigint,
              directory varchar,
              name varchar,
              meta blob,
          PRIMARY KEY ((dirhash, directory), name)
          ) WITH CLUSTERING ORDER BY (name ASC);

          CREATE KEYSPACE IF NOT EXISTS prfexample
              WITH replication = {'class': 'NetworkTopologyStrategy', 'iwakura': '3'}
              AND tablets = {'enabled': false};
          CREATE ROLE IF NOT EXISTS 'prfexample'
              WITH PASSWORD = '{{ .prfexample_password }}'
              AND SUPERUSER = false
              AND LOGIN = true;
          GRANT ALL PERMISSIONS ON KEYSPACE prfexample TO 'prfexample';
      engineVersion: v2
      type: Opaque
