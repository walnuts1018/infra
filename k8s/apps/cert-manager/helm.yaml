apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    annotations:
        notifications.argoproj.io/subscribe.on-deleted.slack: walnuts-sysop
        notifications.argoproj.io/subscribe.on-health-degraded.slack: walnuts-sysop
        notifications.argoproj.io/subscribe.on-sync-failed.slack: walnuts-sysop
    name: cert-manager-helm
    namespace: argocd
spec:
    destination:
        namespace: cert-manager
        server: https://kubernetes.default.svc
    project: default
    source:
        chart: cert-manager
        helm:
            releaseName: cert-manager
            values: |
                installCRDs: true
                config:
                  featureGates:
                    ExperimentalGatewayAPISupport: true
        repoURL: https://charts.jetstack.io
        targetRevision: v1.16.2
    syncPolicy:
        automated:
            prune: true
            selfHeal: true
        syncOptions:
            - ServerSideApply=true

---
