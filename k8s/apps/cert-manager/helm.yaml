apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager-helm
  namespace: argocd
spec:
  destination:
    namespace: cert-manager
    server: https://kubernetes.default.svc
  project: default
  source:
    chart: cert-manager
    helm:
      releaseName: cert-manager
      values: |
        installCRDs: true
        config:
          featureGates:
            ExperimentalGatewayAPISupport: true
        prometheus:
          enabled: true
          servicemonitor:
            enabled: true

        resources:
          requests:
            cpu: 1m
            memory: 78Mi

        webhook:
          resources:
            requests:
              cpu: 2m
              memory: 64Mi

        cainjector:
          resources:
            requests:
              cpu: 1m
              memory: 134Mi
    repoURL: https://charts.jetstack.io
    targetRevision: v1.17.1
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - FailOnSharedResource=true
