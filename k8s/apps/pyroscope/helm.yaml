apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pyroscope-helm
  namespace: argocd
spec:
  destination:
    namespace: pyroscope
    server: https://kubernetes.default.svc
  project: default
  source:
    chart: pyroscope
    helm:
      releaseName: pyroscope
      values: |
        pyroscope:
          replicaCount: 1
          disableSelfProfile: true
          extraArgs:
            log.level: info

          podSecurityContext:
            fsGroup: 10001
            runAsUser: 10001
            runAsNonRoot: true

          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1
              memory: 1Gi

          topologySpreadConstraints:
          - maxSkew: 1
            topologyKey: 'kubernetes.io/hostname'
            whenUnsatisfiable: 'ScheduleAnyway'
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: pyroscope
                app.kubernetes.io/instance: pyroscope
                app.kubernetes.io/component: "all"

          extraEnvVars:
            AWS_WEB_IDENTITY_TOKEN_FILE: /var/run/secrets/sts.seaweedfs.com/serviceaccount/token
            AWS_ROLE_ARN: "arn:aws:iam::role/pyroscope"
            AWS_ENDPOINT_URL_STS: "https://seaweedfs.walnuts.dev"

          extraVolumes:
          - name: seaweedfs-sts-token
            projected:
              sources:
              - serviceAccountToken:
                  audience: sts.seaweedfs.com
                  expirationSeconds: 3600
                  path: token

          extraVolumeMounts:
          - name: seaweedfs-sts-token
            mountPath: /var/run/secrets/sts.seaweedfs.com/serviceaccount
            readOnly: true

          structuredConfig:
            storage:
              backend: s3
              s3:
                endpoint: seaweedfs.local.walnuts.dev
                region: us-east-1
                bucket_name: pyroscope
                force_path_style: true
                native_aws_auth_enabled: true

        architecture:
          storage:
            v1: false
            v2: true

        alloy:
          enabled: false

        serviceMonitor:
          enabled: true
    repoURL: ghcr.io/grafana/helm-charts
    targetRevision: 2.0.1
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - FailOnSharedResource=true
