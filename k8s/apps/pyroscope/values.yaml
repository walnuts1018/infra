pyroscope:
  replicaCount: 1
  disableSelfProfile: true
  extraArgs:
    log.level: info

  podSecurityContext:
    fsGroup: 10001
    runAsUser: 10001
    runAsNonRoot: true

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 1
      memory: 1Gi

  topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: 'kubernetes.io/hostname'
    whenUnsatisfiable: 'ScheduleAnyway'
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: pyroscope
        app.kubernetes.io/instance: pyroscope
        app.kubernetes.io/component: "all"

  extraEnvVars:
    AWS_WEB_IDENTITY_TOKEN_FILE: /var/run/secrets/sts.seaweedfs.com/serviceaccount/token
    AWS_ROLE_ARN: "arn:aws:iam::role/tempo"
    nAWS_ENDPOINT_URL_STS: "https://seaweedfs.walnuts.dev"

  extraVolumes:
  - name: seaweedfs-sts-token
    projected:
      sources:
      - serviceAccountToken:
          audience: sts.seaweedfs.com
          expirationSeconds: 3600
          path: token
  - name: local-ca-bundle
    configMap:
      name: local-ca-bundle

  extraVolumeMounts:
  - name: seaweedfs-sts-token
    mountPath: /var/run/secrets/sts.seaweedfs.com/serviceaccount
    readOnly: true
  - name: local-ca-bundle
    mountPath: /etc/ssl/certs/trust-bundle.pem
    subPath: trust-bundle.pem
    readOnly: true

  structuredConfig:
    storage:
      backend: s3
      s3:
        endpoint: seaweedfs.local.walnuts.dev
        region: us-east-1
        bucket_name: pyroscope
        native_aws_auth_enabled: true

architecture:
  storage:
    v1: false
    v2: true

alloy:
  enabled: false

serviceMonitor:
  enabled: true
