apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
    labels:
        app: external-dns
        app.kubernetes.io/name: external-dns
    name: external-dns
rules:
    - apiGroups:
        - ""
      resources:
        - services
        - endpoints
        - pods
      verbs:
        - get
        - watch
        - list
    - apiGroups:
        - extensions
        - networking.k8s.io
      resources:
        - ingresses
      verbs:
        - get
        - watch
        - list
    - apiGroups:
        - ""
      resources:
        - nodes
      verbs:
        - list
        - watch

---
