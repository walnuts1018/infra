apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  labels:
    app: walnuts-dev
    app.kubernetes.io/name: walnuts-dev
  name: walnuts-dev
  namespace: walnuts-dev
spec:
  resourcePolicy:
    containerPolicies:
      - containerName: walnuts-dev
        controlledResources:
          - memory
        maxAllowed:
          cpu: 500m
          memory: 1Gi
        minAllowed:
          cpu: 100m
          memory: 128Mi
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: walnuts-dev
  updatePolicy:
    updateMode: Auto
