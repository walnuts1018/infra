apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: valkey-operator-helm
  namespace: argocd
spec:
  destination:
    namespace: valkey-operator-system
    server: https://kubernetes.default.svc
  project: default
  source:
    chart: valkey-operator
    helm:
      releaseName: valkey-operator
      values: |
        replicaCount: 1

        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 128Mi

        topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: 'kubernetes.io/hostname'
          whenUnsatisfiable: 'ScheduleAnyway'
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: valkey-operator

        metrics:
          enabled: true
          serviceMonitor:
            enabled: true
    repoURL: https://valkey.io/valkey-helm/
    targetRevision: 0.3.2
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - FailOnSharedResource=true
