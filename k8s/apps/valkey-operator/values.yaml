replicaCount: 1

resources:
  requests:
    cpu: 10m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 128Mi

topologySpreadConstraints:
- maxSkew: 1
  topologyKey: 'kubernetes.io/hostname'
  whenUnsatisfiable: 'ScheduleAnyway'
  labelSelector:
    matchLabels:
      app.kubernetes.io/name: valkey-operator

metrics:
  enabled: true
  serviceMonitor:
    enabled: true
