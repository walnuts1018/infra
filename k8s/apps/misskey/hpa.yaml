apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  labels:
    app: misskey
    app.kubernetes.io/name: misskey
  name: misskey
  namespace: misskey
spec:
  maxReplicaCount: 3
  minReplicaCount: 1
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: misskey
  triggers:
    - metadata:
        value: "95"
      metricType: Utilization
      type: cpu
