apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: longhorn-oauth2-proxy
  namespace: longhorn-system
spec:
  hostnames:
    - longhorn.walnuts.dev
  parentRefs:
    - name: envoy-gateway
      namespace: envoy-gateway-system
  rules:
    - backendRefs:
        - kind: Service
          name: longhorn-frontend
          port: 80
          weight: 1
