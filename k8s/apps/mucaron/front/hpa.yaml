apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  labels:
    app: mucaron-front
    app.kubernetes.io/name: mucaron-front
  name: mucaron-front
  namespace: mucaron
spec:
  maxReplicaCount: 2
  minReplicaCount: 1
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mucaron-front
  triggers:
    - metadata:
        value: "95"
      metricType: Utilization
      type: cpu
