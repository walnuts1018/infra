apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  labels:
    app: mucaron-back
    app.kubernetes.io/name: mucaron-back
  name: mucaron-back
  namespace: mucaron
spec:
  maxReplicaCount: 2
  minReplicaCount: 1
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mucaron-back
  triggers:
    - metadata:
        value: "95"
      metricType: Utilization
      type: cpu
