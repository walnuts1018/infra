apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minio-biscuit-helm
  namespace: argocd
spec:
  destination:
    namespace: minio
    server: https://kubernetes.default.svc
  project: default
  source:
    chart: tenant
    helm:
      releaseName: minio-biscuit
      valuesObject:
        ingress:
          api:
            enabled: true
            host: minio-biscuit.walnuts.dev
            ingressClassName: cilium
            path: /
            pathType: Prefix
          console:
            enabled: true
            host: minio-biscuit-console.walnuts.dev
            ingressClassName: cilium
            path: /
            pathType: Prefix
        tenant:
          buckets:
            - name: longhorn-backup
              region: ap-northeast-1
            - name: minio-backup
              region: ap-northeast-1
          certificate:
            requestAutoCert: false
          configSecret:
            existingSecret: true
            name: minio-biscuit-storage-config-376136
          env:
            - name: MINIO_SERVER_URL
              value: https://minio-biscuit.walnuts.dev
            - name: MINIO_BROWSER_REDIRECT_URL
              value: https://minio-biscuit-console.walnuts.dev
            - name: MINIO_IDENTITY_OPENID_CONFIG_URL
              value: https://auth.walnuts.dev/.well-known/openid-configuration
            - name: MINIO_IDENTITY_OPENID_CLIENT_ID
              value: "340410953382297837"
            - name: MINIO_IDENTITY_OPENID_CLAIM_NAME
              value: minio-policy
            - name: MINIO_IDENTITY_OPENID_SCOPES
              value: openid,profile,email
            - name: MINIO_IDENTITY_OPENID_REDIRECT_URI
              value: https://minio-biscuit-console.walnuts.dev/oauth_callback
            - name: MINIO_IDENTITY_OPENID_DISPLAY_NAME
              value: Walnuts.dev
          features:
            bucketDNS: true
            domains:
              console: minio-biscuit-console.walnuts.dev
              minio:
                - minio-biscuit.walnuts.dev
          metrics:
            enabled: true
            port: 9000
            protocol: http
          name: biscuit
          pools:
            - name: pool-0
              resources:
                limits:
                  cpu: 200m
                  memory: 1Gi
                requests:
                  cpu: 5m
                  memory: 300Mi
              securityContext:
                fsGroup: 1000
                fsGroupChangePolicy: OnRootMismatch
              servers: 1
              size: 32Gi
              storageClassName: manual-minio-hostpath
              volumesPerServer: 1
          users: []
    repoURL: https://operator.min.io/
    targetRevision: 7.1.1
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - FailOnSharedResource=true
