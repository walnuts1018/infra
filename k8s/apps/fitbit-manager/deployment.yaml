apiVersion: apps/v1
kind: Deployment
metadata:
    labels:
        app: fitbit-manager
        app.kubernetes.io/name: fitbit-manager
    name: fitbit-manager
    namespace: fitbit-manager
spec:
    replicas: 1
    selector:
        matchLabels:
            app: fitbit-manager
            app.kubernetes.io/name: fitbit-manager
    template:
        metadata:
            labels:
                app: fitbit-manager
                app.kubernetes.io/name: fitbit-manager
        spec:
            containers:
                - env:
                    - name: GIN_MODE
                      value: release
                    - name: CLIENT_ID
                      valueFrom:
                        secretKeyRef:
                            key: client_id
                            name: fitbit-manager-f8b462
                    - name: CLIENT_SECRET
                      valueFrom:
                        secretKeyRef:
                            key: client_secret
                            name: fitbit-manager-f8b462
                    - name: COOKIE_SECRET
                      valueFrom:
                        secretKeyRef:
                            key: cookie_secret
                            name: fitbit-manager-f8b462
                    - name: PSQL_ENDPOINT
                      value: postgresql-default.databases.svc.cluster.local
                    - name: PSQL_PORT
                      value: "5432"
                    - name: PSQL_DATABASE
                      value: fitbit_manager
                    - name: PSQL_USER
                      value: fitbit_manager
                    - name: PSQL_PASSWORD
                      valueFrom:
                        secretKeyRef:
                            key: postgres_password
                            name: fitbit-manager-f8b462
                    - name: INFLUXDB_ENDPOINT
                      value: http://influxdb-influxdb2.databases.svc.cluster.local
                    - name: INFLUXDB_AUTH_TOKEN
                      valueFrom:
                        secretKeyRef:
                            key: influxdb_auth_token
                            name: fitbit-manager-f8b462
                    - name: INFLUXDB_ORG
                      value: influxdata
                    - name: INFLUXDB_BUCKET
                      value: fitbit_manager
                  image: ghcr.io/walnuts1018/fitbit-manager:0.8.7
                  imagePullPolicy: IfNotPresent
                  name: fitbit-manager
                  ports:
                    - containerPort: 8080
                  resources:
                    limits: {}
                    requests:
                        memory: 10Mi

---
