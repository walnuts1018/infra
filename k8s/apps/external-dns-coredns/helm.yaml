apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns-coredns-helm
  namespace: argocd
spec:
  destination:
    namespace: external-dns-coredns
    server: https://kubernetes.default.svc
  project: default
  source:
    chart: external-dns
    helm:
      releaseName: external-dns-coredns
      values: |
        resources:
          requests:
            cpu: 3m
            memory: 48Mi
          limits:
            memory: 1Gi
        topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: 'kubernetes.io/hostname'
          whenUnsatisfiable: 'ScheduleAnyway'
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: external-dns
        serviceMonitor:
          enabled: true
        triggerLoopOnEvent: true
        sources:
        - gateway-httproute
        - gateway-grpcroute
        - gateway-tlsroute
        - gateway-tcproute
        - gateway-udproute
        - crd
        policy: sync
        registry: noop
        txtOwnerId: external-dns-coredns
        domainFilters:
        - "local.walnuts.dev"
        annotationPrefix: "external-dns-local.alpha.kubernetes.io/"
        provider:
          name: coredns
        env:
        - name: ETCD_URLS
          value: "http://coredns-etcd.coredns.svc.cluster.local:2379"
        extraArgs:
          coredns-strictly-owned: true
          crd-source-apiversion: externaldns.k8s.io/v1alpha1
          crd-source-kind: DNSEndpoint
    repoURL: https://kubernetes-sigs.github.io/external-dns/
    targetRevision: 1.21.1
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - FailOnSharedResource=true
