resources:
  requests:
    cpu: 3m
    memory: 48Mi
  limits:
    memory: 1Gi
topologySpreadConstraints:
- maxSkew: 1
  topologyKey: 'kubernetes.io/hostname'
  whenUnsatisfiable: 'ScheduleAnyway'
  labelSelector:
    matchLabels:
      app.kubernetes.io/name: external-dns
serviceMonitor:
  enabled: true
triggerLoopOnEvent: true
sources:
- gateway-httproute
- gateway-grpcroute
- gateway-tlsroute
- gateway-tcproute
- gateway-udproute
- crd
policy: sync
registry: noop
domainFilters:
- "local.walnuts.dev"
annotationPrefix: "external-dns-local.alpha.kubernetes.io/"
provider:
  name: coredns
env:
- name: ETCD_URLS
  value: "http://coredns-etcd.coredns.svc.cluster.local:2379"
extraArgs:
  crd-source-apiversion: externaldns.k8s.io/v1alpha1
  crd-source-kind: DNSEndpoint
