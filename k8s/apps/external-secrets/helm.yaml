apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-helm
  namespace: argocd
spec:
  destination:
    namespace: external-secrets
    server: https://kubernetes.default.svc
  project: default
  source:
    chart: external-secrets
    helm:
      releaseName: external-secrets
      values: |
        resources:
          requests:
            cpu: 20m
            memory: 128Mi

        webhook:
          resources:
            requests:
              cpu: 10m
              memory: 32Mi

        certController:
          resources:
            requests:
              cpu: 2m
              memory: 28Mi
    repoURL: https://charts.external-secrets.io
    targetRevision: 0.14.4
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - FailOnSharedResource=true
