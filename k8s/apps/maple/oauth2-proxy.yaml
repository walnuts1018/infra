apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: maple-oauth2-proxy-d16393
spec:
  data:
    - remoteRef:
        key: maple-oauth2-proxy
        property: client-id
      secretKey: client-id
    - remoteRef:
        key: maple-oauth2-proxy
        property: client-secret
      secretKey: client-secret
    - remoteRef:
        key: maple-oauth2-proxy
        property: cookie-secret
      secretKey: cookie-secret
    - remoteRef:
        key: redis
        property: password
      secretKey: redis-password
  refreshInterval: 1m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: maple-oauth2-proxy-d16393
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: maple-oauth2-proxy-helm
  namespace: argocd
spec:
  destination:
    namespace: maple
    server: https://kubernetes.default.svc
  project: default
  source:
    chart: oauth2-proxy
    helm:
      releaseName: maple-oauth2-proxy
      valuesObject:
        config:
          configFile: |-
            email_domains = [ "*" ]
            upstreams = [ "http://maple.maple.svc.cluster.local:3000" ]
            pass_access_token = true
            user_id_claim = "sub"
            oidc_groups_claim="my:zitadel:grants"
            allowed_groups = ["237477822715658605:maple-users"]
          existingSecret: maple-oauth2-proxy-d16393
        extraArgs:
          code-challenge-method: S256
          oidc-issuer-url: https://auth.walnuts.dev
          provider: oidc
          redirect-url: https://maple.walnuts.dev/oauth2/callback
          skip-provider-button: true
        ingress:
          className: cilium
          enabled: true
          hosts:
            - maple.walnuts.dev
          path: /
          pathType: Prefix
        metrics:
          enabled: true
        resources:
          limits:
            cpu: 100m
            memory: 128Mi
          requests:
            cpu: 1m
            memory: 5Mi
        sessionStorage:
          redis:
            clientType: sentinel
            existingSecret: maple-oauth2-proxy-d16393
            passwordKey: redis-password
            sentinel:
              connectionUrls: redis://maple-oauth2-proxy-redis:6379,redis://maple-oauth2-proxy-redis-sentinel:26379
              existingSecret: maple-oauth2-proxy-d16393
              masterName: mymaster
              passwordKey: redis-password
          type: redis
    repoURL: https://oauth2-proxy.github.io/manifests
    targetRevision: 7.12.6
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - FailOnSharedResource=true
---
apiVersion: redis.redis.opstreelabs.in/v1beta2
kind: RedisReplication
metadata:
  labels:
    app: maple-oauth2-proxy-redis
    app.kubernetes.io/name: maple-oauth2-proxy-redis
  name: maple-oauth2-proxy-redis
spec:
  clusterSize: 2
  kubernetesConfig:
    image: quay.io/opstree/redis:v7.0.12
    imagePullPolicy: IfNotPresent
    redisSecret:
      key: redis-password
      name: maple-oauth2-proxy-d16393
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 4m
        memory: 4Mi
  podSecurityContext:
    fsGroup: 1000
    runAsUser: 1000
  storage:
    volumeClaimTemplate:
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
---
apiVersion: redis.redis.opstreelabs.in/v1beta2
kind: RedisSentinel
metadata:
  labels:
    app: maple-oauth2-proxy-redis
    app.kubernetes.io/name: maple-oauth2-proxy-redis
  name: maple-oauth2-proxy-redis
spec:
  clusterSize: 3
  kubernetesConfig:
    image: quay.io/opstree/redis-sentinel:v7.0.12
    imagePullPolicy: IfNotPresent
    redisSecret:
      key: redis-password
      name: maple-oauth2-proxy-d16393
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 4m
        memory: 4Mi
  podSecurityContext:
    fsGroup: 1000
    runAsUser: 1000
  redisSentinelConfig:
    downAfterMilliseconds: "30000"
    failoverTimeout: "180000"
    masterGroupName: mymaster
    parallelSyncs: "1"
    quorum: "2"
    redisPort: "6379"
    redisReplicationName: maple-oauth2-proxy-redis
