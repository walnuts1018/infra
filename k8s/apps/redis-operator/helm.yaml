apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    annotations:
        notifications.argoproj.io/subscribe.on-deleted.slack: walnuts-sysop
        notifications.argoproj.io/subscribe.on-health-degraded.slack: walnuts-sysop
        notifications.argoproj.io/subscribe.on-sync-failed.slack: walnuts-sysop
    name: redis-operator-helm
    namespace: argocd
spec:
    destination:
        namespace: redis-operator
        server: https://kubernetes.default.svc
    project: default
    source:
        chart: redis-operator
        helm:
            releaseName: redis-operator
            values: |
                resources:
                  limits:
                    cpu: 500m
                    memory: 500Mi
                  requests:
                    cpu: 30m
                    memory: 32Mi

                # redisOperator:
                #   extraArgs:
                #   - "-zap-log-level=debug"
        repoURL: https://ot-container-kit.github.io/helm-charts/
        targetRevision: 0.18.5
    syncPolicy:
        automated:
            prune: true
            selfHeal: true
        syncOptions:
            - ServerSideApply=true

---
