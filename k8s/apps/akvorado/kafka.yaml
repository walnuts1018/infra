apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    strimzi.io/node-pools: enabled
  labels:
    app: akvorado-kafka
    app.kubernetes.io/name: akvorado-kafka
  name: akvorado-kafka
  namespace: akvorado
spec:
  entityOperator:
    topicOperator:
      resources:
        limits:
          cpu: 500m
          memory: 1Gi
        requests:
          cpu: 4m
          memory: 232Mi
    userOperator:
      resources:
        limits:
          cpu: 500m
          memory: 1Gi
        requests:
          cpu: 7m
          memory: 233Mi
  kafka:
    config:
      default.replication.factor: 1
      min.insync.replicas: 1
      offsets.topic.replication.factor: 1
      transaction.state.log.min.isr: 1
      transaction.state.log.replication.factor: 1
    listeners:
      - name: plain
        port: 9092
        tls: false
        type: internal
    version: 4.3.0
