kafka:
  topic: flows
  brokers:
  - akvorado-kafka-kafka-bootstrap:9092
  topic-configuration:
    num-partitions: 2
    replication-factor: 1
clickhousedb:
  servers:
  - akvorado-clickhouse-clickhouse-0-0-0.akvorado-clickhouse-clickhouse-headless.akvorado.svc.cluster.local:9000
clickhouse:
  orchestrator-url: http://akvorado-orchestrator:8080
  asns:
    65000: "Home Network"
  networks:
    192.168.0.0/24:
      name: server
      role: server
      site: kawasaki
      region: ap-japan-kanto
    fd7e:bc2d:5f4a:100::/64:
      name: server
      role: server
      site: kawasaki
      region: ap-japan-kanto
    192.168.100.0/24:
      name: user
      role: client
      site: kawasaki
      region: ap-japan-kanto
    fd7e:bc2d:5f4a:200::/64:
      name: user
      role: client
      site: kawasaki
      region: ap-japan-kanto
    192.168.4.0/24:
      name: management
      role: management
      site: kawasaki
      region: ap-japan-kanto
    192.168.252.0/30:
      name: transit
      role: transit
      site: kawasaki
      region: ap-japan-kanto
    192.168.252.4/30:
      name: transit
      role: transit
      site: kawasaki
      region: ap-japan-kanto
inlet: !include "inlet.yaml"
outlet: !include "outlet.yaml"
console: !include "console.yaml"
