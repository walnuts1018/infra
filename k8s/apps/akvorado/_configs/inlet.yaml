flow:
  inputs:
    - type: udp
      decoder: netflow
      listen: :2055
      workers: 2
    - type: udp
      decoder: sflow
      listen: :6343
      workers: 2
snmp:
  # VyOSルーターのSNMPポーリングでIF名を取得
  communities:
    - targets:
        - 192.168.0.1
      community: public
routing:
  provider: static
  asns:
    65000: "Home Network"
