apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mpeg-dash-encoder
  namespace: mpeg-dash-encoder
spec:
  hostnames:
    - mpeg-dash-encoder.walnuts.dev
  parentRefs:
    - name: envoy-gateway
      namespace: envoy-gateway-system
  rules:
    - backendRefs:
        - kind: Service
          name: mpeg-dash-encoder
          port: 8080
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
