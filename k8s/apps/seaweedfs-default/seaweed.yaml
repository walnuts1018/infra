apiVersion: seaweed.seaweedfs.com/v1
kind: Seaweed
metadata:
  labels:
    app: seaweedfs-default
    app.kubernetes.io/name: seaweedfs-default
  name: seaweedfs-default
  namespace: seaweedfs
spec:
  filer:
    config: ""
    limits:
      cpu: 200m
      memory: 256Mi
    replicas: 2
    requests:
      cpu: 100m
      memory: 128Mi
    s3:
      enabled: true
    service:
      type: ClusterIP
    volumeMounts:
      - mountPath: /etc/seaweedfs
        name: filer-config-custom
        readOnly: true
      - mountPath: /etc/seaweedfs/scylladb-ca
        name: scylla-db-ca-cert
        readOnly: true
      - mountPath: /etc/seaweedfs/scylladb-client
        name: scylla-db-client-cert
        readOnly: true
    volumes:
      - name: filer-config-custom
        secret:
          secretName: seaweedfs-default-filer-config-a6ae80
      - configMap:
          items:
            - key: ca.crt
              path: ca.crt
          name: seaweedfs-default-scylladb-ca-cert-c0f830
        name: scylla-db-ca-cert
      - name: scylla-db-client-cert
        secret:
          items:
            - key: tls.crt
              path: tls.crt
            - key: tls.key
              path: tls.key
          secretName: scylla-cluster-local-client-ca
  image: ghcr.io/walnuts1018/seaweedfs:dev
  master:
    replicas: 3
    volumeSizeLimitMB: 1024
  volume:
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/component: volume
                  app.kubernetes.io/instance: seaweedfs-default
              topologyKey: topology.kubernetes.io/zone
            weight: 50
          - podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/component: volume
                  app.kubernetes.io/instance: seaweedfs-default
              topologyKey: kubernetes.io/region
            weight: 40
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app.kubernetes.io/component: volume
                app.kubernetes.io/instance: seaweedfs-default
            topologyKey: kubernetes.io/hostname
    limits:
      cpu: "1"
      memory: 2Gi
    replicas: 3
    requests:
      cpu: 100m
      memory: 128Mi
      storage: 2Gi
    storageClassName: local-path
