apiVersion: batch/v1
kind: CronJob
metadata:
  labels:
    app: renovate
    app.kubernetes.io/name: renovate
  name: renovate
  namespace: renovate
spec:
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - env:
                - name: RENOVATE_PLATFORM
                  value: github
                - name: RENOVATE_CONFIG_FILE
                  value: /config/config.js
                - name: RENOVATE_AUTODISCOVER
                  value: "true"
                - name: RENOVATE_AUTODISCOVER_FILTER
                  value: walnuts1018/infra
                - name: RENOVATE_BRANCH_PREFIX
                  value: renovate/
                - name: RENOVATE_BRANCH_PREFIX_OLD
                  value: renovate/
                - name: RENOVATE_IGNORE_PR_AUTHOR
                  value: "true"
                - name: GITHUB_APP_ID
                  valueFrom:
                    secretKeyRef:
                      key: github-app-id
                      name: renovate-c9f627
                - name: GITHUB_APP_INSTALLATION_ID
                  valueFrom:
                    secretKeyRef:
                      key: github-app-installation-id
                      name: renovate-c9f627
                - name: GITHUB_APP_PRIVATE_KEY
                  valueFrom:
                    secretKeyRef:
                      key: github-app-private-key
                      name: renovate-c9f627
              image: ghcr.io/renovatebot/renovate:43.232.1
              name: renovate
              resources:
                limits:
                  cpu: 500m
                  memory: 8Gi
                requests:
                  cpu: 400m
                  memory: 2Gi
              securityContext:
                capabilities:
                  add:
                    - NET_BIND_SERVICE
                  drop:
                    - all
                readOnlyRootFilesystem: true
                seccompProfile:
                  type: RuntimeDefault
              volumeMounts:
                - mountPath: /tmp/renovate
                  name: renovate
                - mountPath: /config
                  name: config
                  readOnly: true
          initContainers:
            - command:
                - sh
                - -c
                - findmnt /tmp/renovate -n -o USE% | awk '{if( int($1) > 75 ){ system("rm -rf /tmp/renovate/cache") }}'
              image: debian:13.5-slim
              name: disk-cleaner
              securityContext:
                runAsUser: 0
              volumeMounts:
                - mountPath: /tmp/renovate
                  name: renovate
          restartPolicy: Never
          securityContext:
            fsGroup: 12021
            fsGroupChangePolicy: OnRootMismatch
          tolerations:
            - key: node.walnuts.dev/untrusted
              operator: Exists
          volumes:
            - name: renovate
              persistentVolumeClaim:
                claimName: renovate
            - configMap:
                name: renovate-config-5be44a
              name: config
  schedule: '*/5 * * * *'
