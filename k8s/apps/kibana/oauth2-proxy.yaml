apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
    name: kibana-oauth2-proxy-f68729
spec:
    data:
        - remoteRef:
            key: kibana-oauth2-proxy
            property: client-id
          secretKey: client-id
        - remoteRef:
            key: kibana-oauth2-proxy
            property: client-secret
          secretKey: client-secret
        - remoteRef:
            key: kibana-oauth2-proxy
            property: cookie-secret
          secretKey: cookie-secret
        - remoteRef:
            key: redis
            property: password
          secretKey: redis-password
    refreshInterval: 1m
    secretStoreRef:
        kind: ClusterSecretStore
        name: onepassword
    target:
        name: kibana-oauth2-proxy-f68729

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    annotations:
        notifications.argoproj.io/subscribe.on-deleted.slack: walnuts-sysop
        notifications.argoproj.io/subscribe.on-health-degraded.slack: walnuts-sysop
        notifications.argoproj.io/subscribe.on-sync-failed.slack: walnuts-sysop
    name: kibana-oauth2-proxy-helm
    namespace: argocd
spec:
    destination:
        namespace: elasticsearch
        server: https://kubernetes.default.svc
    project: default
    source:
        chart: oauth2-proxy
        helm:
            releaseName: kibana-oauth2-proxy
            valuesObject:
                config:
                    configFile: |-
                        email_domains = [ "*" ]
                        upstreams = [ "http://kibana.elasticsearch.svc.cluster.local:5601" ]
                        pass_access_token = true
                        user_id_claim = "sub"
                        oidc_groups_claim="my:zitadel:grants"
                        allowed_groups = ["237477822715658605:kibana-admin"]
                    existingSecret: kibana-oauth2-proxy-f68729
                extraArgs:
                    oidc-issuer-url: https://auth.walnuts.dev
                    provider: oidc
                    redirect-url: https://kibana.walnuts.dev/oauth2/callback
                    skip-provider-button: true
                ingress:
                    className: nginx
                    enabled: true
                    hosts:
                        - kibana.walnuts.dev
                    path: /
                    pathType: Prefix
                metrics:
                    enabled: true
                sessionStorage:
                    redis:
                        clientType: sentinel
                        existingSecret: kibana-oauth2-proxy-f68729
                        passwordKey: redis-password
                        sentinel:
                            connectionUrls: redis://kibana-oauth2-proxy-redis:6379,redis://kibana-oauth2-proxy-redis-sentinel:26379
                            existingSecret: kibana-oauth2-proxy-f68729
                            masterName: mymaster
                            passwordKey: redis-password
                    type: redis
        repoURL: https://oauth2-proxy.github.io/manifests
        targetRevision: 7.8.1
    syncPolicy:
        automated:
            prune: true
            selfHeal: true
        syncOptions:
            - ServerSideApply=true

---
apiVersion: redis.redis.opstreelabs.in/v1beta2
kind: RedisReplication
metadata:
    labels:
        app: kibana-oauth2-proxy-redis
        app.kubernetes.io/name: kibana-oauth2-proxy-redis
    name: kibana-oauth2-proxy-redis
spec:
    clusterSize: 2
    kubernetesConfig:
        image: quay.io/opstree/redis:v7.0.12
        imagePullPolicy: IfNotPresent
        redisSecret:
            key: redis-password
            name: kibana-oauth2-proxy-f68729
    podSecurityContext:
        fsGroup: 1000
        runAsUser: 1000
    storage:
        volumeClaimTemplate:
            spec:
                accessModes:
                    - ReadWriteOnce
                resources:
                    requests:
                        storage: 1Gi

---
apiVersion: redis.redis.opstreelabs.in/v1beta2
kind: RedisSentinel
metadata:
    labels:
        app: kibana-oauth2-proxy-redis
        app.kubernetes.io/name: kibana-oauth2-proxy-redis
    name: kibana-oauth2-proxy-redis
spec:
    clusterSize: 3
    kubernetesConfig:
        image: quay.io/opstree/redis-sentinel:v7.0.12
        imagePullPolicy: IfNotPresent
        redisSecret:
            key: redis-password
            name: kibana-oauth2-proxy-f68729
    podSecurityContext:
        fsGroup: 1000
        runAsUser: 1000
    redisSentinelConfig:
        downAfterMilliseconds: "30000"
        failoverTimeout: "180000"
        masterGroupName: mymaster
        parallelSyncs: "1"
        quorum: "2"
        redisPort: "6379"
        redisReplicationName: kibana-oauth2-proxy-redis

---
