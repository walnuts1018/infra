apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana-helm
  namespace: argocd
spec:
  destination:
    namespace: monitoring
    server: https://kubernetes.default.svc
  project: default
  source:
    chart: grafana
    helm:
      releaseName: grafana
      values: |
        replicas: 1
        autoscaling:
          enabled: true
          minReplicas: 1
          maxReplicas: 5
          targetCPU: ""
          targetMemory: "100"
        resources:
          requests:
            cpu: 80m
            memory: 330Mi
          limits:
            cpu: 500m
            memory: 2Gi
        downloadDashboards:
          resources:
            requests:
              cpu: 1m
              memory: 295Mi
            limits:
              cpu: "1"
              memory: 1Gi
        ingress:
          enabled: false
          hosts:
          - grafana.walnuts.dev
          ingressClassName: cilium
        rbac:
          pspEnabled: false
        testFramework:
          enabled: false
        persistence:
          enabled: false
        service:
          type: ClusterIP
        admin:
          existingSecret: "grafana"
          userKey: admin-username
          passwordKey: admin-password
        extraSecretMounts:
        - name: auth-generic-oauth-secret
          secretName: grafana
          mountPath: /etc/secrets
          readOnly: true
        grafana.ini:
          server:
            domain: grafana.walnuts.dev
            root_url: https://grafana.walnuts.dev/
          # log:
          #   level: debug
          security:
            secret_key: $__file{/etc/secrets/secret_key}
          auth:
            disable_login_form: true
            oauth_auto_login: true
          auth.basic:
            enabled: false
          auth.generic_oauth:
            enabled: true
            client_id: 237480184528306541@walnuts.dev
            client_secret: $__file{/etc/secrets/client_secret}
            scopes: openid email profile offline_access urn:zitadel:iam:org:projects:roles
            email_attribute_path: email
            login_attribute_path: preferred_username
            name_attribute_path: preferred_username
            auth_url: https://auth.walnuts.dev/oauth/v2/authorize
            token_url: https://auth.walnuts.dev/oauth/v2/token
            api_url: https://auth.walnuts.dev/oidc/v1/userinfo
            role_attribute_strict: true
            role_attribute_path: |
              "urn:zitadel:iam:org:project:roles"."admin"  && 'GrafanaAdmin' || "urn:zitadel:iam:org:project:roles"."grafana-editor" && 'Editor' || "urn:zitadel:iam:org:project:roles"."grafana-viewer" && 'Viewer'
            allow_assign_grafana_admin: true
            use_pkce: true
          feature_toggles:
            provisioning: true
            kubernetesDashboards: true
          smtp:
            enabled: true
            from_address: grafana@resend.walnuts.dev
            host: smtp.resend.com:587
            user: "resend"
            password: $__file{/etc/secrets/smtp_password}
          database:
            type: postgres
            host: postgresql-default-rw.databases.svc.cluster.local
            name: grafana
            user: grafana
            password: $__file{/etc/secrets/postgres_password}
        sidecar:
          dashboards:
            enabled: false
            initDashboards: false
          plugins:
            enabled: true
          datasources:
            enabled: true
          resources:
            requests:
              cpu: 1m
              memory: 92Mi
            limits:
              memory: 512Mi
        plugins:
        - knightss27-weathermap-panel
        - grafana-github-datasource
        - volkovlabs-echarts-panel
        datasources:
          datasources.yaml:
            apiVersion: 1
            datasources:
            - name: VictoriaMetrics
              type: prometheus
              url: http://victoria-metrics-victoria-metrics-cluster-vmselect.victoria-metrics.svc.cluster.local:8481/select/0/prometheus
              access: proxy
              isDefault: true
            - name: Loki
              type: loki
              url: http://loki-gateway.loki.svc.cluster.local
              access: proxy
              isDefault: false
            - name: Tempo
              type: tempo
              url: http://tempo-gateway.tempo.svc.cluster.local
              access: proxy
              isDefault: false
            - name: influxdb
              type: influxdb
              url: http://influxdb-influxdb2.databases.svc.cluster.local
              access: proxy
              isDefault: false
              user: admin
              jsonData:
                httpMode: POST
                organization: influxdata
                pdcInjected: false
                version: Flux
              secureJsonData:
                token: $__file{/etc/secrets/influxdb_token}

        route:
          main:
            enabled: true
            annotations:
              external-dns-cloudflare.alpha.kubernetes.io/cloudflare-proxied: "true"
            hostnames:
              - grafana.walnuts.dev
            parentRefs:
              - name: envoy-gateway
                namespace: envoy-gateway-system
    repoURL: https://grafana-community.github.io/helm-charts
    targetRevision: 12.4.8
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - FailOnSharedResource=true
