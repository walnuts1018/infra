# Source: grafana/templates/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana
  namespace: monitoring
  labels:
    helm.sh/chart: grafana-12.4.8
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: grafana
    app.kubernetes.io/version: "13.0.2"
data:
  
  plugins: knightss27-weathermap-panel,grafana-github-datasource,volkovlabs-echarts-panel
  grafana.ini: |
    [analytics]
    check_for_updates = true
    [auth]
    disable_login_form = true
    oauth_auto_login = true
    [auth.basic]
    enabled = false
    [auth.generic_oauth]
    allow_assign_grafana_admin = true
    api_url = https://auth.walnuts.dev/oidc/v1/userinfo
    auth_url = https://auth.walnuts.dev/oauth/v2/authorize
    client_id = 237480184528306541@walnuts.dev
    client_secret = $__file{/etc/secrets/client_secret}
    email_attribute_path = email
    enabled = true
    login_attribute_path = preferred_username
    name_attribute_path = preferred_username
    role_attribute_path = "urn:zitadel:iam:org:project:roles"."admin"  && 'GrafanaAdmin' || "urn:zitadel:iam:org:project:roles"."grafana-editor" && 'Editor' || "urn:zitadel:iam:org:project:roles"."grafana-viewer" && 'Viewer'
  
    role_attribute_strict = true
    scopes = openid email profile offline_access urn:zitadel:iam:org:projects:roles
    token_url = https://auth.walnuts.dev/oauth/v2/token
    use_pkce = true
    [database]
    host = postgresql-default-rw.databases.svc.cluster.local
    name = grafana
    password = $__file{/etc/secrets/postgres_password}
    type = postgres
    user = grafana
    [feature_toggles]
    kubernetesDashboards = true
    provisioning = true
    [log]
    mode = console
    [paths]
    data = /var/lib/grafana/
    logs = /var/log/grafana
    plugins = /var/lib/grafana/plugins
    provisioning = /etc/grafana/provisioning
    [security]
    secret_key = $__file{/etc/secrets/secret_key}
    [server]
    domain = grafana.walnuts.dev
    root_url = https://grafana.walnuts.dev/
    [smtp]
    enabled = true
    from_address = grafana@resend.walnuts.dev
    host = smtp.resend.com:587
    password = $__file{/etc/secrets/smtp_password}
    user = resend
    [unified_storage]
    index_path = /var/lib/grafana-search/bleve
  datasources.yaml: |
    apiVersion: 1
    datasources:
    - access: proxy
      isDefault: true
      name: VictoriaMetrics
      type: prometheus
      url: http://victoria-metrics-victoria-metrics-cluster-vmselect.victoria-metrics.svc.cluster.local:8481/select/0/prometheus
    - access: proxy
      isDefault: false
      name: Loki
      type: loki
      url: http://loki-gateway.loki.svc.cluster.local
    - access: proxy
      isDefault: false
      name: Tempo
      type: tempo
      url: http://tempo-gateway.tempo.svc.cluster.local
    - access: proxy
      isDefault: false
      jsonData:
        httpMode: POST
        organization: influxdata
        pdcInjected: false
        version: Flux
      name: influxdb
      secureJsonData:
        token: $__file{/etc/secrets/influxdb_token}
      type: influxdb
      url: http://influxdb-influxdb2.databases.svc.cluster.local
      user: admin
