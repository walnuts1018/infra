apiVersion: apps/v1
kind: Deployment
metadata:
  name: terrakube-dex
  namespace: terrakube
  labels:
    helm.sh/chart: dex-0.24.0
    app.kubernetes.io/name: dex
    app.kubernetes.io/instance: terrakube
    app.kubernetes.io/version: "2.44.0"
    app.kubernetes.io/managed-by: Helm
    
  
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: dex
      app.kubernetes.io/instance: terrakube
  template:
    metadata:
      annotations:
      
      labels:
        app.kubernetes.io/name: dex
        app.kubernetes.io/instance: terrakube
    spec:
      serviceAccountName: terrakube-dex
      securityContext:
        {}
      containers:
        - name: dex
          securityContext:
            {}
          image: "ghcr.io/dexidp/dex:v2.44.0"
          imagePullPolicy: IfNotPresent
          args:
            - dex
            - serve
            - --web-http-addr
            - 0.0.0.0:5556
            - --telemetry-addr
            - 0.0.0.0:5558
            - /etc/dex/config.yaml
          env:
          ports:
            - name: http
              containerPort: 5556
              protocol: TCP
            - name: telemetry
              containerPort: 5558
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz/live
              port: telemetry
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: telemetry
          resources:
            {}
          volumeMounts:
            - name: config
              mountPath: /etc/dex
              readOnly: true
      volumes:
        - name: config
          secret:
            secretName: terrakube-dex-899c19
        - name: gcp-credentials
          secret:
            items:
            - key: gcp-credentials
              path: gcp-credentials
            secretName: terrakube-dex-secrets
