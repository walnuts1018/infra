apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: photoprism-mariadb
  namespace: "photoprism"
  labels:
    app.kubernetes.io/instance: photoprism-mariadb
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: mariadb
    app.kubernetes.io/version: 11.4.7
