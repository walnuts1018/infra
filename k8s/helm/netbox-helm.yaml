# Source: netbox/charts/valkey/templates/health-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: netbox-valkey-health
  namespace: "netbox"
  labels:
    app.kubernetes.io/instance: netbox
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: valkey
    app.kubernetes.io/version: 9.1.0
    helm.sh/chart: valkey-6.1.9
data:
  ping_readiness_local.sh: |-
    #!/bin/bash

    timeout=$1
    run_valkey_command() {
        local args=("-p" "$VALKEY_PORT")
        timeout -s 15 $timeout valkey-cli "${args[@]}" "$@"
    }

    [[ -f $VALKEY_PASSWORD_FILE ]] && export VALKEY_PASSWORD="$(< "${VALKEY_PASSWORD_FILE}")"
    [[ -n "$VALKEY_PASSWORD" ]] && export REDISCLI_AUTH="$VALKEY_PASSWORD"
    response=$(run_valkey_command ping)
    if [ "$?" -eq "124" ]; then
      echo "Timed out"
      exit 1
    fi
    if [ "$response" != "PONG" ]; then
      echo "$response"
      exit 1
    fi
  ping_liveness_local.sh: |-
    #!/bin/bash

    [[ -f $VALKEY_PASSWORD_FILE ]] && export VALKEY_PASSWORD="$(< "${VALKEY_PASSWORD_FILE}")"
    [[ -n "$VALKEY_PASSWORD" ]] && export REDISCLI_AUTH="$VALKEY_PASSWORD"
    response=$(
      timeout -s 15 $1 \
      valkey-cli \
        -h localhost \
        -p $VALKEY_PORT \
        ping
    )
    if [ "$?" -eq "124" ]; then
      echo "Timed out"
      exit 1
    fi
    responseFirstWord=$(echo $response | head -n1 | awk '{print $1;}')
    if [ "$response" != "PONG" ] && [ "$responseFirstWord" != "LOADING" ] && [ "$responseFirstWord" != "MASTERDOWN" ]; then
      echo "$response"
      exit 1
    fi
  ping_readiness_primary.sh: |-
    #!/bin/bash

    [[ -f $VALKEY_PRIMARY_PASSWORD_FILE ]] && export VALKEY_PRIMARY_PASSWORD="$(< "${VALKEY_PRIMARY_PASSWORD_FILE}")"
    [[ -n "$VALKEY_PRIMARY_PASSWORD" ]] && export REDISCLI_AUTH="$VALKEY_PRIMARY_PASSWORD"
    response=$(
      timeout -s 15 $1 \
      valkey-cli \
        -h $VALKEY_PRIMARY_HOST \
        -p $VALKEY_PRIMARY_PORT_NUMBER \
        ping
    )
    if [ "$?" -eq "124" ]; then
      echo "Timed out"
      exit 1
    fi
    if [ "$response" != "PONG" ]; then
      echo "$response"
      exit 1
    fi
  ping_liveness_primary.sh: |-
    #!/bin/bash

    [[ -f $VALKEY_PRIMARY_PASSWORD_FILE ]] && export VALKEY_PRIMARY_PASSWORD="$(< "${VALKEY_PRIMARY_PASSWORD_FILE}")"
    [[ -n "$VALKEY_PRIMARY_PASSWORD" ]] && export REDISCLI_AUTH="$VALKEY_PRIMARY_PASSWORD"
    response=$(
      timeout -s 15 $1 \
      valkey-cli \
        -h $VALKEY_PRIMARY_HOST \
        -p $VALKEY_PRIMARY_PORT_NUMBER \
        ping
    )
    if [ "$?" -eq "124" ]; then
      echo "Timed out"
      exit 1
    fi
    responseFirstWord=$(echo $response | head -n1 | awk '{print $1;}')
    if [ "$response" != "PONG" ] && [ "$responseFirstWord" != "LOADING" ]; then
      echo "$response"
      exit 1
    fi
  ping_readiness_local_and_primary.sh: |-
    script_dir="$(dirname "$0")"
    exit_status=0
    "$script_dir/ping_readiness_local.sh" $1 || exit_status=$?
    "$script_dir/ping_readiness_primary.sh" $1 || exit_status=$?
    exit $exit_status
  ping_liveness_local_and_primary.sh: |-
    script_dir="$(dirname "$0")"
    exit_status=0
    "$script_dir/ping_liveness_local.sh" $1 || exit_status=$?
    "$script_dir/ping_liveness_primary.sh" $1 || exit_status=$?
    exit $exit_status
---
# Source: netbox/charts/valkey/templates/scripts-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: netbox-valkey-scripts
  namespace: "netbox"
  labels:
    app.kubernetes.io/instance: netbox
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: valkey
    app.kubernetes.io/version: 9.1.0
    helm.sh/chart: valkey-6.1.9
    app.kubernetes.io/part-of: valkey
data:
  start-primary.sh: |
    #!/bin/bash

    [[ -f $VALKEY_PASSWORD_FILE ]] && export VALKEY_PASSWORD="$(< "${VALKEY_PASSWORD_FILE}")"
    if [[ -f /opt/bitnami/valkey/mounted-etc/primary.conf ]];then
        cp /opt/bitnami/valkey/mounted-etc/primary.conf /opt/bitnami/valkey/etc/primary.conf
    fi
    if [[ -f /opt/bitnami/valkey/mounted-etc/valkey.conf ]];then
        cp /opt/bitnami/valkey/mounted-etc/valkey.conf /opt/bitnami/valkey/etc/valkey.conf
    fi
    ARGS=("--port" "${VALKEY_PORT}")
    VALKEY_AUTH_CONF="$(mktemp /tmp/valkey-auth-XXXXXX.conf)"
    chmod 600 "${VALKEY_AUTH_CONF}"
    printf "requirepass %s\nprimaryauth %s\n" "${VALKEY_PASSWORD}" "${VALKEY_PASSWORD}" > "${VALKEY_AUTH_CONF}"
    ARGS+=("--include" "${VALKEY_AUTH_CONF}")
    ARGS+=("--include" "/opt/bitnami/valkey/etc/valkey.conf")
    ARGS+=("--include" "/opt/bitnami/valkey/etc/primary.conf")
    exec valkey-server "${ARGS[@]}"
  start-replica.sh: |
    #!/bin/bash

    get_port() {
        hostname="$1"
        type="$2"

        port_var=$(echo "${hostname^^}_SERVICE_PORT_$type" | sed "s/-/_/g")
        port=${!port_var}

        if [ -z "$port" ]; then
            case $type in
                "SENTINEL")
                    echo 26379
                    ;;
                "VALKEY")
                    echo 6379
                    ;;
            esac
        else
            echo $port
        fi
    }

    get_full_hostname() {
        hostname="$1"
        full_hostname="${hostname}.${HEADLESS_SERVICE}"
        echo "${full_hostname}"
    }

    VALKEYPORT=$(get_port "$HOSTNAME" "VALKEY")
    HEADLESS_SERVICE="netbox-valkey-headless.netbox.svc.cluster.local"

    [[ -f $VALKEY_PASSWORD_FILE ]] && export VALKEY_PASSWORD="$(< "${VALKEY_PASSWORD_FILE}")"
    [[ -f $VALKEY_PRIMARY_PASSWORD_FILE ]] && export VALKEY_PRIMARY_PASSWORD="$(< "${VALKEY_PRIMARY_PASSWORD_FILE}")"
    if [[ -f /opt/bitnami/valkey/mounted-etc/replica.conf ]];then
        cp /opt/bitnami/valkey/mounted-etc/replica.conf /opt/bitnami/valkey/etc/replica.conf
    fi
    if [[ -f /opt/bitnami/valkey/mounted-etc/valkey.conf ]];then
        cp /opt/bitnami/valkey/mounted-etc/valkey.conf /opt/bitnami/valkey/etc/valkey.conf
    fi

    echo "" >> /opt/bitnami/valkey/etc/replica.conf
    echo "replica-announce-port $VALKEYPORT" >> /opt/bitnami/valkey/etc/replica.conf
    echo "replica-announce-ip $(get_full_hostname "$HOSTNAME")" >> /opt/bitnami/valkey/etc/replica.conf
    ARGS=("--port" "${VALKEY_PORT}")
    ARGS+=("--replicaof" "${VALKEY_PRIMARY_HOST}" "${VALKEY_PRIMARY_PORT_NUMBER}")
    VALKEY_AUTH_CONF="$(mktemp /tmp/valkey-auth-XXXXXX.conf)"
    chmod 600 "${VALKEY_AUTH_CONF}"
    printf "requirepass %s\nprimaryauth %s\n" "${VALKEY_PASSWORD}" "${VALKEY_PRIMARY_PASSWORD}" > "${VALKEY_AUTH_CONF}"
    ARGS+=("--include" "${VALKEY_AUTH_CONF}")
    ARGS+=("--include" "/opt/bitnami/valkey/etc/valkey.conf")
    ARGS+=("--include" "/opt/bitnami/valkey/etc/replica.conf")
    exec valkey-server "${ARGS[@]}"
---
# Source: netbox/templates/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: netbox
  namespace: "netbox"
  labels:
    app.kubernetes.io/instance: netbox
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: netbox
    app.kubernetes.io/version: v4.6.3
    helm.sh/chart: netbox-8.3.18
data:
  configuration.py: |-
    
    """
    This file serves as a base configuration for Netbox
    https://netboxlabs.com/docs/netbox/en/stable/configuration/
    """
    
    import json
    import os
    import re
    from pathlib import Path
    
    import yaml
    
    
    def _deep_merge(source, destination):
        """Inspired by https://stackoverflow.com/a/20666342"""
        for key, value in source.items():
            dst_value = destination.get(key)
    
            if isinstance(value, dict) and isinstance(dst_value, dict):
                _deep_merge(value, dst_value)
            else:
                destination[key] = value
    
        return destination
    
    
    def _load_yaml() -> None:
        """Load YAML from files"""
        extra_config_base = Path("/run/config/extra")
        config_files = [Path("/run/config/netbox/netbox.yaml")]
    
        config_files.extend(sorted(extra_config_base.glob("*/*.yaml")))
    
        for config_file in config_files:
            with open(config_file, "r", encoding="utf-8") as f:
                config = yaml.safe_load(f)
            _deep_merge(config, globals())
    
    
    def _read_secret(secret_name: str, secret_key: str, default: str | None = None) -> str | None:
        """Read secret from file"""
        try:
            secret = open(
                f"/run/secrets/{secret_name}/{secret_key}",
                "r",
                encoding="utf-8",
            )
        except EnvironmentError:
            return default
        with secret:
            return secret.read().strip()
    
    
    CORS_ORIGIN_REGEX_WHITELIST = []
    DATABASES = {}
    EMAIL = {}
    REDIS = {}
    
    _load_yaml()
    
    provided_secret_name = os.getenv("SECRET_NAME", "netbox")
    
    DATABASES["default"]["PASSWORD"] = _read_secret(provided_secret_name, "db_password")
    EMAIL["PASSWORD"] = _read_secret(provided_secret_name, "email_password")
    REDIS["tasks"]["PASSWORD"] = _read_secret(provided_secret_name, "tasks_password")
    REDIS["caching"]["PASSWORD"] = _read_secret(provided_secret_name, "cache_password")
    SECRET_KEY = _read_secret(provided_secret_name, "secret_key")
    
    # Read API token peppers from secret (JSON with integer or string keys)
    _peppers_raw = _read_secret(provided_secret_name, "api_token_peppers")
    if _peppers_raw:
        try:
            API_TOKEN_PEPPERS = {int(k): v for k, v in json.loads(_peppers_raw).items()}
        except (json.JSONDecodeError, ValueError, TypeError) as exc:
            raise ValueError(
                f"Invalid api_token_peppers secret: expected a JSON object mapping numeric "
                f'string keys to string values, e.g. {{"1": "random-string..."}}. '
                f"Keys are converted to integers at load time. Error: {exc}"
            ) from exc
    
    # Post-process certain values
    CORS_ORIGIN_REGEX_WHITELIST = [re.compile(r) for r in CORS_ORIGIN_REGEX_WHITELIST]
    if "SENTINELS" in REDIS["tasks"]:
        REDIS["tasks"]["SENTINELS"] = [tuple(x.split(r":")) for x in REDIS["tasks"]["SENTINELS"]]
    if "SENTINELS" in REDIS["caching"]:
        REDIS["caching"]["SENTINELS"] = [tuple(x.split(r":")) for x in REDIS["caching"]["SENTINELS"]]
    if ALLOWED_HOSTS_INCLUDES_POD_ID:
        ALLOWED_HOSTS.append(os.getenv("POD_IP"))
    

  netbox.yaml: |-
    ALLOWED_HOSTS: ["netbox.walnuts.dev"]
    ALLOWED_HOSTS_INCLUDES_POD_ID: true

    DATABASES:
      default:
        HOST: "postgresql-default-rw.databases.svc.cluster.local"
        USER: "netbox"
        NAME: "netbox"
        PORT: 5432
        ENGINE: "django.db.backends.postgresql"
        OPTIONS:
          sslmode: prefer
          target_session_attrs: read-write
        CONN_MAX_AGE: 300
        DISABLE_SERVER_SIDE_CURSORS: false

    ADMINS: []
    ALLOW_TOKEN_RETRIEVAL: false
    AUTH_PASSWORD_VALIDATORS: []
    ALLOWED_URL_SCHEMES: ["file","ftp","ftps","http","https","irc","mailto","sftp","ssh","tel","telnet","tftp","vnc","xmpp"]
    BANNER_BOTTOM: ""
    BANNER_LOGIN: ""
    BANNER_TOP: ""
    BASE_PATH: ""
    CHANGELOG_RETENTION: 90
    CUSTOM_VALIDATORS: {}
    DEFAULT_USER_PREFERENCES: {}
    CORS_ORIGIN_ALLOW_ALL: false
    CORS_ORIGIN_WHITELIST: []
    CORS_ORIGIN_REGEX_WHITELIST: []
    CSRF_TRUSTED_ORIGINS: ["https://netbox.walnuts.dev"]
    DATA_UPLOAD_MAX_MEMORY_SIZE: 2621440
    DEBUG: false
    DEFAULT_LANGUAGE: "en-us"

    EMAIL:
      SERVER: "smtp.resend.com"
      PORT: 587
      USERNAME: "resend"
      USE_SSL: false
      USE_TLS: true
      SSL_CERTFILE: ""
      SSL_KEYFILE: ""
      TIMEOUT: 10
      FROM_EMAIL: "netbox@resend.walnuts.dev"

    ENFORCE_GLOBAL_UNIQUE: true
    EXEMPT_VIEW_PERMISSIONS: []
    FIELD_CHOICES: {}
    FILE_UPLOAD_MAX_MEMORY_SIZE: 2621440
    GRAPHQL_ENABLED: true
    HTTP_PROXIES: {}
    INTERNAL_IPS: ["127.0.0.1","::1"]
    JOB_RETENTION: 90
    LOGGING: {}
    LOGIN_PERSISTENCE: true
    LOGIN_REQUIRED: true
    LOGIN_TIMEOUT: 1209600
    LOGOUT_REDIRECT_URL: "home"
    MAINTENANCE_MODE: false
    MAPS_URL: "https://maps.google.com/?q="
    MAX_PAGE_SIZE: 1000
    MEDIA_ROOT: /opt/netbox/netbox/media
    STORAGES: {"default":{"BACKEND":"storages.backends.s3boto3.S3Boto3Storage","OPTIONS":{"addressing_style":"path","bucket_name":"netbox-media","default_acl":"private","endpoint_url":"https://seaweedfs.local.walnuts.dev"}},"scripts":{"BACKEND":"storages.backends.s3boto3.S3Boto3Storage","OPTIONS":{"addressing_style":"path","bucket_name":"netbox-scripts","default_acl":"private","endpoint_url":"https://seaweedfs.local.walnuts.dev"}}}
    METRICS_ENABLED: false
    PAGINATE_COUNT: 50
    PLUGINS: ["netbox_diode_plugin"]
    PLUGINS_CONFIG: {"netbox_diode_plugin":{"diode_target_override":"grpc://diode-gateway.netbox.svc.cluster.local/diode","diode_username":"diode"}}
    POWERFEED_DEFAULT_AMPERAGE: 15
    POWERFEED_DEFAULT_MAX_UTILIZATION: 80
    POWERFEED_DEFAULT_VOLTAGE: 120
    PREFER_IPV4: false
    RACK_ELEVATION_DEFAULT_UNIT_HEIGHT: 22
    RACK_ELEVATION_DEFAULT_UNIT_WIDTH: 220
    REMOTE_AUTH_ENABLED: true
    REMOTE_AUTH_BACKEND: ["social_core.backends.open_id_connect.OpenIdConnectAuth"]
    REMOTE_AUTH_HEADER: "HTTP_REMOTE_USER"
    REMOTE_AUTH_USER_FIRST_NAME: "HTTP_REMOTE_USER_FIRST_NAME"
    REMOTE_AUTH_USER_LAST_NAME: "HTTP_REMOTE_USER_LAST_NAME"
    REMOTE_AUTH_USER_EMAIL: "HTTP_REMOTE_USER_EMAIL"
    REMOTE_AUTH_AUTO_CREATE_USER: true
    REMOTE_AUTH_AUTO_CREATE_GROUPS: false
    REMOTE_AUTH_DEFAULT_GROUPS: []
