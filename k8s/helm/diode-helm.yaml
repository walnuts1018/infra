apiVersion: batch/v1
kind: Job
metadata:
  name: diode-auth-bootstrap
  namespace: netbox
  labels:
    helm.sh/chart: diode-1.14.0
    app.kubernetes.io/name: diode
    app.kubernetes.io/instance: diode
    app.kubernetes.io/version: "1.5.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: diode-auth-bootstrap
  annotations:
    helm.sh/hook: post-install, post-upgrade
    helm.sh/hook-weight: "2"
spec:
  backoffLimit: 20
  template:
    metadata:
      labels:
        app.kubernetes.io/name: diode
        app.kubernetes.io/instance: diode
        app.kubernetes.io/component: diode-auth-bootstrap
    spec:
      serviceAccountName: diode-auth-serviceaccount
      initContainers:
        - name: wait-for-oauth2-server
          image: "busybox:latest"
          imagePullPolicy: "IfNotPresent"
          command:
            - sh
            - -c
            - |
              host=diode-hydra-public.netbox.svc.cluster.local
              port=4444
              until nc -z $host $port; do
                echo "Waiting for OAuth2 server";
                sleep 3;
              done;
              echo "OAuth2 server is up and running";
      containers:
        - name: diode-auth-bootstrap
          image: "docker.io/netboxlabs/diode-auth:1.12.0"
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "/etc/config/oauth2/bootstrap-clients.sh"]
          env:
            - name: HYDRA_ADMIN_URL
              value: http://diode-hydra-admin.netbox.svc.cluster.local:4445
          volumeMounts:
            - name: oauth2-secret
              mountPath: /etc/config/oauth2/client
              readOnly: true
      volumes:
        - name: oauth2-secret
          secret:
            secretName: diode-auth-oauth2-secret
      restartPolicy: OnFailure
