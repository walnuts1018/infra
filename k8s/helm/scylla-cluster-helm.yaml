---
# Source: scylla/templates/scyllacluster.yaml
apiVersion: scylla.scylladb.com/v1
kind: ScyllaCluster
metadata:
  name: scylla-cluster
  namespace: databases
spec:
  version: 2025.4.0
  agentVersion: 3.7.0@sha256:bfceefaabeecc119ea8c39150314967c5b8efc22334c0ca3e020ed2ab9ca7e19
  repository: scylladb/scylla
  agentRepository: scylladb/scylla-manager-agent
  developerMode: true
  datacenter:
    name: iwakura
    racks:
    - members: 3
      name: iwakura-a
      placement:
        nodeAffinity: {}
        podAffinity: {}
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: scylla/cluster
                  operator: In
                  values:
                  - scylla-cluster
              topologyKey: kubernetes.io/hostname
            weight: 100
        tolerations: []
      resources:
        limits:
          cpu: "1"
          memory: 3Gi
        requests:
          cpu: 50m
          memory: 1Gi
      scyllaConfig: scylla-config-f2b364
      storage:
        capacity: 8Gi
        storageClassName: local-path
---
# Source: scylla/templates/servicemonitor.yaml
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: scylla-cluster-service-monitor
  namespace: databases
spec:
  jobLabel: "app"
  targetLabels: ["scylla/cluster"]
  podTargetLabels: ["scylla/datacenter"]
  selector:
    matchLabels:
      app: scylla
  endpoints:
  - port: agent-prometheus
    metricRelabelings:
    # rename job label to 'manager_agent' due to hardcoded name
    # in Scylla Monitoring.
    - sourceLabels: [ endpoint ]
      targetLabel: job
      regex: agent-prometheus
      replacement: manager_agent
  - port: prometheus
    metricRelabelings:
    - sourceLabels: [ scylla_cluster ]
      targetLabel: cluster
      regex: (.*)
      replacement: ${1}
      action: replace
    - sourceLabels: [ scylla_datacenter ]
      targetLabel: dc
      regex: (.*)
      replacement: ${1}
      action: replace
