# Source: loki/templates/gateway/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-gateway
  namespace: loki
  labels:
    helm.sh/chart: loki-13.2.0
    app.kubernetes.io/name: loki
    app.kubernetes.io/instance: loki
    app.kubernetes.io/version: "3.7.1"
    app.kubernetes.io/component: gateway
data:
  nginx.conf: |
    worker_processes  5;  ## Default: 1
    error_log  /dev/stderr;
    pid        /tmp/nginx.pid;
    worker_rlimit_nofile 8192;
    
    events {
      worker_connections  4096;  ## Default: 1024
    }
    
    http {
      client_body_temp_path /tmp/client_temp;
      proxy_temp_path       /tmp/proxy_temp_path;
      fastcgi_temp_path     /tmp/fastcgi_temp;
      uwsgi_temp_path       /tmp/uwsgi_temp;
      scgi_temp_path        /tmp/scgi_temp;
    
      client_max_body_size  4M;
    
      proxy_read_timeout    600; ## 10 minutes
      proxy_send_timeout    600;
      proxy_connect_timeout 600;
    
      proxy_http_version    1.1;
    
      default_type application/octet-stream;
      log_format   main '$remote_addr - $remote_user [$time_local]  $status '
            '"$request" $body_bytes_sent "$http_referer" '
            '"$http_user_agent" "$http_x_forwarded_for"';
      # Exclude specific requests from logging
      map $request_uri $track {
        default 1;
        ~^/$ 0;
        ~^/health 0;
        ~^/metrics 0;
      }
    
      # simple_upstream preset
      log_format access_log_exporter '$http_host\t$request_method\t$status\t$request_completion\t$request_time\t$request_length\t$bytes_sent\t$upstream_addr\t$upstream_connect_time\t$upstream_header_time\t$upstream_response_time\t$request_uri';
      access_log syslog:server=127.0.0.1:8514,nohostname access_log_exporter if=$track;
      access_log   /dev/stderr  main;
    
      sendfile     on;
      tcp_nopush   on;
      resolver kube-dns.kube-system.svc.cluster.local.;
    
      # if the X-Query-Tags header is empty, set a noop= without a value as empty values are not logged
      map $http_x_query_tags $query_tags {
        ""        "noop=";            # When header is empty, set noop=
        default   $http_x_query_tags; # Otherwise, preserve the original value
      }
    
      server {
        listen             8080;
        listen             [::]:8080;
    
        location = / {
          
          return 200 'OK';
          auth_basic off;
        }
    
        location = /stub_status {
          stub_status on;
          satisfy any;
          access_log off;
          allow 127.0.0.1;
          deny all;
          server_tokens on;  # expose nginx version
        }
    
        ########################################################
        # Configure backend targets
        location ^~ /ui {
          
          set $backend     "http://loki-querier.loki.svc.cluster.local:3100";
          proxy_pass       $backend$request_uri;
        }
    
        # Distributor
        location = /api/prom/push {
          
          set $backend     "http://loki-distributor.loki.svc.cluster.local:3100";
          proxy_pass       $backend$request_uri;
        }
        location = /loki/api/v1/push {
          
          set $backend     "http://loki-distributor.loki.svc.cluster.local:3100";
          proxy_pass       $backend$request_uri;
        }
        location = /distributor/ring {
          
          set $backend     "http://loki-distributor.loki.svc.cluster.local:3100";
          proxy_pass       $backend$request_uri;
        }
        location = /otlp/v1/logs {
          
          set $backend     "http://loki-distributor.loki.svc.cluster.local:3100";
          proxy_pass       $backend$request_uri;
        }
    
        # Ingester
        location = /flush {
          
          set $backend     "http://loki-ingester.loki.svc.cluster.local:3100";
          proxy_pass       $backend$request_uri;
        }
        location ^~ /ingester/ {
          
          set $backend     "http://loki-ingester.loki.svc.cluster.local:3100";
          proxy_pass       $backend$request_uri;
        }
        location = /ingester {
          
          internal;        # to suppress 301
        }
    
        # Ring
        location = /ring {
          
          set $backend     "http://loki-ingester.loki.svc.cluster.local:3100";
          proxy_pass       $backend$request_uri;
        }
    
        # MemberListKV
        location = /memberlist {
          
          set $backend     "http://loki-ingester.loki.svc.cluster.local:3100";
          proxy_pass       $backend$request_uri;
        }
    
        # Ruler
        location = /ruler/ring {
          
          set $backend     "http://loki-ruler.loki.svc.cluster.local:3100";
          proxy_pass       $backend$request_uri;
        }
        location = /api/prom/rules {
          
          set $backend     "http://loki-ruler.loki.svc.cluster.local:3100";
          proxy_pass       $backend$request_uri;
        }
        location ^~ /api/prom/rules/ {
          
          set $backend     "http://loki-ruler.loki.svc.cluster.local:3100";
          proxy_pass       $backend$request_uri;
        }
        location = /loki/api/v1/rules {
          
          set $backend     "http://loki-ruler.loki.svc.cluster.local:3100";
          proxy_pass       $backend$request_uri;
        }
        location ^~ /loki/api/v1/rules/ {
          
          set $backend     "http://loki-ruler.loki.svc.cluster.local:3100";
          proxy_pass       $backend$request_uri;
        }
        location = /prometheus/api/v1/alerts {
          
          set $backend     "http://loki-ruler.loki.svc.cluster.local:3100";
          proxy_pass       $backend$request_uri;
        }
        location = /prometheus/api/v1/rules {
          
          set $backend     "http://loki-ruler.loki.svc.cluster.local:3100";
          proxy_pass       $backend$request_uri;
        }
    
        # Compactor
        location = /compactor/ring {
          
          set $backend     "http://loki-compactor.loki.svc.cluster.local:3100";
          proxy_pass       $backend$request_uri;
        }
        location = /loki/api/v1/delete {
          
          set $backend     "http://loki-compactor.loki.svc.cluster.local:3100";
          proxy_pass       $backend$request_uri;
        }
        location = /loki/api/v1/cache/generation_numbers {
          
          set $backend     "http://loki-compactor.loki.svc.cluster.local:3100";
          proxy_pass       $backend$request_uri;
        }
    
        # IndexGateway
        location = /indexgateway/ring {
          
          set $backend     "http://loki-index-gateway.loki.svc.cluster.local:3100";
          proxy_pass       $backend$request_uri;
        }
    
        # QueryScheduler
        location = /scheduler/ring {
          
          set $backend     "http://loki-scheduler.loki.svc.cluster.local:3100";
          proxy_pass       $backend$request_uri;
        }
    
        # Config
        location = /config {
          
          set $backend     "http://loki-ingester.loki.svc.cluster.local:3100";
          proxy_pass       $backend$request_uri;
        }
    
        # QueryFrontend, Querier
        location = /api/prom/tail {
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
          
          set $backend     "http://loki-query-frontend.loki.svc.cluster.local:3100";
          proxy_pass       $backend$request_uri;
        }
        location = /loki/api/v1/tail {
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
          
          set $backend     "http://loki-query-frontend.loki.svc.cluster.local:3100";
          proxy_pass       $backend$request_uri;
        }
        location ^~ /api/prom/ {
          
          set $backend     "http://loki-query-frontend.loki.svc.cluster.local:3100";
          proxy_pass       $backend$request_uri;
        }
        location = /api/prom {
          
          internal;        # to suppress 301
        }
        location ^~ /loki/api/v1/ {
          # pass custom headers set by Grafana as X-Query-Tags which are logged as key/value pairs in metrics.go log messages
          proxy_set_header X-Query-Tags "${query_tags},user=${http_x_grafana_user},dashboard_id=${http_x_dashboard_uid},dashboard_title=${http_x_dashboard_title},panel_id=${http_x_panel_id},panel_title=${http_x_panel_title},source_rule_uid=${http_x_rule_uid},rule_name=${http_x_rule_name},rule_folder=${http_x_rule_folder},rule_version=${http_x_rule_version},rule_source=${http_x_rule_source},rule_type=${http_x_rule_type}";
          
          set $backend     "http://loki-query-frontend.loki.svc.cluster.local:3100";
          proxy_pass       $backend$request_uri;
        }
        location = /loki/api/v1 {
          
          internal;        # to suppress 301
        }
      }
    }
  access-log-exporter.yaml: |
    presets:
      loki:
        metrics:
          - name: "http_requests_total"
            type: "counter"
            help: "The total number of client requests."
            labels:
              - name: "host"
                lineIndex: 0
              - name: "method"
                lineIndex: 1
              - name: "status"
                lineIndex: 2
              - name: "path"
                lineIndex: 11
                replacements:
                  - regexp: "^$"
                    replacement: "/"
                  - regexp: "^(.+)\\?.+"
                    replacement: "$1"

          - name: "http_requests_completed_total"
            type: "counter"
            help: "The total number of completed requests."
            valueIndex: 3
            replacements:
              - string: "OK"
                replacement: "1"
            labels:
              - name: "host"
                lineIndex: 0
              - name: "method"
                lineIndex: 1
              - name: "status"
                lineIndex: 2
              - name: "path"
                lineIndex: 11
                replacements:
                  - regexp: "^$"
                    replacement: "/"
                  - regexp: "^(.+)\\?.+"
                    replacement: "$1"

          - name: "http_request_size_bytes"
            type: "histogram"
            buckets: [ 10,1000,100000,1000000,5000000,50000000,200000000 ]
            help: "The request length (including request line, header, and request body)"
            valueIndex: 5
            labels:
              - name: "host"
                lineIndex: 0
              - name: "method"
                lineIndex: 1
              - name: "status"
                lineIndex: 2
              - name: "path"
                lineIndex: 11
                replacements:
                  - regexp: "^$"
                    replacement: "/"
                  - regexp: "^(.+)\\?.+"
                    replacement: "$1"

          - name: "http_response_size_bytes"
            type: "histogram"
            buckets: [ 10,1000,100000,1000000,5000000,50000000,200000000 ]
            help: "The response length (including request line, header, and request body)"
            valueIndex: 6
            labels:
              - name: "host"
                lineIndex: 0
              - name: "method"
                lineIndex: 1
              - name: "status"
                lineIndex: 2
              - name: "path"
                lineIndex: 11
                replacements:
                  - regexp: "^$"
                    replacement: "/"
                  - regexp: "^(.+)\\?.+"
                    replacement: "$1"

          - name: "http_request_duration_seconds"
            type: "histogram"
            buckets: [ .005, .01, .025, .05, .1, .25, .5, 1, 2.5, 5, 10 ]
            help: "The time spent on receiving and response the response to the client"
            valueIndex: 4
            math:
              enabled: true
              div: 1000
            labels:
              - name: "host"
                lineIndex: 0
              - name: "method"
                lineIndex: 1
              - name: "status"
                lineIndex: 2
              - name: "path"
                lineIndex: 11
                replacements:
                  - regexp: "^$"
                    replacement: "/"
                  - regexp: "^(.+)\\?.+"
                    replacement: "$1"

          - name: "http_upstream_connect_duration_seconds"
            type: "histogram"
            buckets: [ .005, .01, .025, .05, .1, .25, .5, 1, 2.5, 5, 10 ]
            help: "The time spent on establishing a connection with the upstream server"
            valueIndex: 8
            math:
              enabled: true
              div: 1000
            upstream:
              enabled: true
              addrLineIndex: 7
              excludes: []
            labels:
              - name: "host"
                lineIndex: 0
              - name: "method"
                lineIndex: 1
              - name: "status"
                lineIndex: 2
              - name: "path"
                lineIndex: 11
                replacements:
                  - regexp: "^$"
                    replacement: "/"
                  - regexp: "^(.+)\\?.+"
                    replacement: "$1"

          - name: "http_upstream_header_duration_seconds"
            type: "histogram"
            help: "The time spent on receiving the response header from the upstream server"
            buckets: [ .005, .01, .025, .05, .1, .25, .5, 1, 2.5, 5, 10 ]
            valueIndex: 9
            math:
              enabled: true
              div: 1000
            upstream:
              enabled: true
              addrLineIndex: 7
              excludes: []
            labels:
              - name: "host"
                lineIndex: 0
              - name: "method"
                lineIndex: 1
              - name: "status"
                lineIndex: 2
              - name: "path"
                lineIndex: 11
                replacements:
                  - regexp: "^$"
                    replacement: "/"
                  - regexp: "^(.+)\\?.+"
                    replacement: "$1"

          - name: "http_upstream_request_duration_seconds"
            type: "histogram"
            help: "The time spent on receiving the response from the upstream server"
            buckets: [ .005, .01, .025, .05, .1, .25, .5, 1, 2.5, 5, 10 ]
            valueIndex: 10
            math:
              enabled: true
              div: 1000
            upstream:
              enabled: true
              addrLineIndex: 7
              excludes: []
            labels:
              - name: "host"
                lineIndex: 0
              - name: "method"
                lineIndex: 1
              - name: "status"
                lineIndex: 2
              - name: "path"
                lineIndex: 11
                replacements:
                  - regexp: "^$"
