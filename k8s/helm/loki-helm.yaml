# Source: loki/templates/config.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki
  namespace: loki
  labels:
    helm.sh/chart: loki-13.2.0
    app.kubernetes.io/name: loki
    app.kubernetes.io/instance: loki
    app.kubernetes.io/version: "3.7.1"
data:
  config.yaml: |
    
    auth_enabled: false
    bloom_build:
      builder:
        planner_address: loki-bloom-planner-headless.loki.svc.cluster.local:9095
      enabled: true
      planner:
        planning_interval: 6h
    bloom_gateway:
      client:
        addresses: dnssrvnoa+_grpc._tcp.loki-bloom-gateway-headless.loki.svc.cluster.local
      enabled: true
    chunk_store_config:
      chunk_cache_config:
        background:
          writeback_buffer: 100000
          writeback_goroutines: 1
          writeback_size_limit: 100MB
        default_validity: 0s
        memcached:
          batch_size: 4
          parallelism: 5
        memcached_client:
          addresses: dnssrvnoa+_memcached-client._tcp.loki-chunks-cache.loki.svc.cluster.local
          consistent_hash: true
          max_idle_conns: 72
          timeout: 2000ms
      chunk_cache_config_l2:
        background:
          writeback_buffer: 50000
          writeback_goroutines: 1
          writeback_size_limit: 50MB
        default_validity: 0s
        memcached:
          batch_size: 4
          parallelism: 5
        memcached_client:
          addresses: dnssrvnoa+_memcached-client._tcp.loki-chunks-cache-l2.loki.svc.cluster.local
          consistent_hash: true
          max_idle_conns: 72
          timeout: 2000ms
      l2_chunk_cache_handoff: 345600s
    common:
      compactor_grpc_address: 'loki-compactor.loki.svc.cluster.local:9095'
      path_prefix: /var/loki
      replication_factor: 1
      storage:
        object_store:
          s3:
            access_key_id: null
            bucket_lookup_type: path
            bucket_name: loki-chunks
            endpoint: seaweedfs.local.walnuts.dev
            http: {}
            insecure: false
            region: us-east-1
            secret_access_key: null
            sse: {}
            storage_class: REDUCED_REDUNDANCY
            sts_endpoint: https://seaweedfs.local.walnuts.dev
          storage_prefix: null
    compactor:
      delete_request_store: s3
      retention_enabled: true
    distributor:
      otlp_config:
        default_resource_attributes_as_index_labels:
        - service.name
        - service.namespace
        - service.instance.id
        - cloud.region
        - cloud.availability_zone
        - k8s.cluster.name
        - k8s.namespace.name
        - k8s.container.name
        - container.name
        - k8s.deployment.name
        - k8s.statefulset.name
        - k8s.daemonset.name
        - k8s.cronjob.name
        - k8s.job.name
    frontend:
      scheduler_address: loki-query-scheduler.loki.svc.cluster.local:9095
      tail_proxy_url: http://loki-querier.loki.svc.cluster.local:3100
    frontend_worker:
      scheduler_address: loki-query-scheduler.loki.svc.cluster.local:9095
    index_gateway:
      mode: simple
    ingester:
      chunk_encoding: snappy
      wal:
        flush_on_shutdown: true
    limits_config:
      allow_structured_metadata: true
      ingestion_burst_size_mb: 100
      max_cache_freshness_per_query: 10m
      query_timeout: 300s
      reject_old_samples: false
      reject_old_samples_max_age: 168h
      retention_period: 336h
      shard_streams:
        desired_rate: 104857600
        enabled: true
      split_queries_by_interval: 15m
      volume_enabled: true
    memberlist:
      abort_if_cluster_join_fails: true
      advertise_addr: ${HASH_RING_INSTANCE_ADDR}
      advertise_port: 7946
      bind_port: 7946
      join_members:
      - loki-memberlist.loki.svc.cluster.local
      max_join_backoff: 1m
      max_join_retries: 10
      min_join_backoff: 1s
      rejoin_interval: 90s
    pattern_ingester:
      enabled: true
    query_range:
      align_queries_with_step: true
      cache_results: true
      results_cache:
        cache:
          background:
            writeback_buffer: 10000
            writeback_goroutines: 1
            writeback_size_limit: 10MB
          default_validity: 12h
          memcached_client:
            addresses: dnssrvnoa+_memcached-client._tcp.loki-results-cache.loki.svc.cluster.local
            consistent_hash: true
            timeout: 500ms
            update_interval: 1m
    ruler:
      storage:
        s3:
          bucketnames: loki-ruler
          insecure: false
          s3forcepathstyle: false
        type: s3
      wal:
        dir: /var/loki/ruler-wal
    ruler_storage:
      backend: s3
      s3:
        access_key_id: null
        bucket_lookup_type: path
        bucket_name: loki-ruler
        endpoint: seaweedfs.local.walnuts.dev
        http: {}
        insecure: false
        region: us-east-1
        secret_access_key: null
        sse: {}
        storage_class: REDUCED_REDUNDANCY
        sts_endpoint: https://seaweedfs.local.walnuts.dev
      storage_prefix: null
    runtime_config:
      file: /etc/loki/runtime-config/runtime-config.yaml
    schema_config:
      configs:
      - from: "2024-01-01"
        index:
          period: 24h
          prefix: loki_index_
        object_store: s3
        schema: v13
        store: tsdb
    server:
      graceful_shutdown_timeout: 5s
      grpc_listen_port: 9095
      grpc_server_max_concurrent_streams: 1000
      grpc_server_max_recv_msg_size: 104857600
      grpc_server_max_send_msg_size: 104857600
      grpc_server_min_time_between_pings: 10s
      grpc_server_ping_without_stream_allowed: true
      http_listen_port: 3100
      http_server_idle_timeout: 30s
      http_server_read_timeout: 10m0s
      http_server_write_timeout: 10m0s
      log_level: info
    storage_config:
      bloom_shipper:
        working_directory: /var/loki/data/bloomshipper
      boltdb_shipper:
        index_gateway_client:
          server_address: dns+loki-index-gateway-headless.loki.svc.cluster.local:9095
      hedging:
        at: 250ms
        max_per_second: 20
        up_to: 3
      tsdb_shipper:
        index_gateway_client:
          server_address: dns+loki-index-gateway-headless.loki.svc.cluster.local:9095
      use_thanos_objstore: true
    tracing:
      enabled: true
